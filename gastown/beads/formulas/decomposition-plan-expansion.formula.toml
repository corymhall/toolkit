# Decomposition Plan Expansion
#
# Read an enriched umbrella spec, generate `plan-draft.md`, review it twice,
# and leave behind a decomposition plan for beadify.
#
# Usage:
#   gt sling decomposition-plan-expansion <crew> --var feature="ipv6-support"

description = """
Read a cleaned umbrella `spec.md`, generate `plan-draft.md`, run the default
two decomposition-plan review passes, and leave behind a beadify-ready
decomposition artifact.

**Input:** `docs/plans/{{feature}}/spec.md`
**Output:** `docs/plans/{{feature}}/plan-draft.md`

This formula is intended for `epic-delivery-workflow`. It separates
requirements/design intent from workstream decomposition and sequencing.

## Review Model

By default this formula runs two explicit review passes:

1. **Coverage + workstream boundaries**
2. **Sequencing + cross-cutting concerns**

## Artifact Contract

`plan-draft.md` is not a second spec. It should answer:
- what coherent feature/workstream beads should exist
- what order or dependency structure they need
- what cross-cutting work spans them
- what planning questions still affect decomposition quality

Use the standard template at `gastown/docs/templates/plan-draft.md`.
"""
formula = "decomposition-plan-expansion"
type = "expansion"
pour = true
version = 1

[vars]
[vars.feature]
description = "Feature name (maps to docs/plans/{{feature}}/spec.md)"
required = true

[[template]]
id = "{target}.kickoff"
title = "Decomposition Plan Kickoff"
description = """
═══════════════════════════════════════════════════════════════
 DECOMPOSITION PLAN
 Clean umbrella spec -> workstream plan -> 2 review passes -> `plan-draft.md`

 Input:  docs/plans/{{feature}}/spec.md
 Output: docs/plans/{{feature}}/plan-draft.md
═══════════════════════════════════════════════════════════════

Output this banner to the user, then close this step to begin.
"""

[[template]]
id = "{target}.validate-spec"
title = "Validate spec for decomposition planning"
needs = ["{target}.kickoff"]
description = """
Validate that `spec.md` is ready to be turned into a decomposition plan.

## Validate

1. Confirm `docs/plans/{{feature}}/spec.md` exists.
2. Confirm the spec includes, at minimum:
   - Overview
   - Goals
   - Scope
   - Constraints
   - Acceptance Criteria
   - Design
   - Non-Negotiables
   - Forbidden Approaches
   - Decision Log
   - Traceability
3. If these are missing, stop and return to spec work.
4. If `Open Questions` still contain issues that materially change workstream
   boundaries, stop and return to convergence work.

## Output

Report that the spec is ready for decomposition planning.
"""

[[template]]
id = "{target}.draft-plan"
title = "Draft decomposition plan"
needs = ["{target}.validate-spec"]
description = """
Generate `docs/plans/{{feature}}/plan-draft.md` from the spec.

## Inputs

- `docs/plans/{{feature}}/spec.md`
- `gastown/docs/templates/plan-draft.md`

## Planning Rules

Generate a workstream decomposition plan, not a second requirements document.

Requirements:
- identify coherent feature/workstream beads
- capture scope for each workstream
- identify likely files / systems touched at a high level
- define sequencing / dependency structure only where it is real
- identify cross-cutting work such as migration, rollout, docs, and final validation

When deciding workstream boundaries:
- prefer coherent ownership and integration boundaries over arbitrary phase buckets
- keep feature/workstream beads large enough to justify `delivery-workflow`
- do not decompose all the way to implementation microtasks here

Write `docs/plans/{{feature}}/plan-draft.md` using the standard template.
"""

[[template]]
id = "{target}.review-pass-1"
title = "Review pass 1: coverage + boundaries"
needs = ["{target}.draft-plan"]
description = """
Review `plan-draft.md` for coverage and workstream quality.

## Inputs

- `docs/plans/{{feature}}/spec.md`
- `docs/plans/{{feature}}/plan-draft.md`

## Review Questions

1. Does the plan cover all material goals and design areas from the spec?
2. Are the workstream boundaries coherent and implementation-meaningful?
3. Is any workstream too broad, too narrow, or obviously missing?
4. Are prototype learnings reflected as planning guidance rather than code cargo cult?

Apply fixes to `plan-draft.md`, and revise `spec.md` only if the plan reveals a
real spec gap or contradiction.
"""

[[template]]
id = "{target}.review-pass-2"
title = "Review pass 2: sequencing + cross-cutting concerns"
needs = ["{target}.review-pass-1"]
description = """
Review `plan-draft.md` for sequencing and cross-cutting work.

## Inputs

- `docs/plans/{{feature}}/spec.md`
- `docs/plans/{{feature}}/plan-draft.md`

## Review Questions

1. Is the sequencing/dependency model correct and minimal?
2. Are merge-gated vs code-order dependencies distinguished appropriately?
3. Did we capture cross-cutting work such as testing, rollout, docs, and final validation?
4. Is there any hidden work that will fall through the cracks during beadify?

Apply fixes to `plan-draft.md`, and revise `spec.md` only if the plan reveals
unresolved ambiguity.
"""

[[template]]
id = "{target}.finalize-plan"
title = "Finalize `plan-draft.md`"
needs = ["{target}.review-pass-2"]
description = """
Finalize the decomposition plan and summarize the handoff to beadify.

Final checks:
- `plan-draft.md` exists
- workstreams are coherent
- sequencing is documented
- cross-cutting concerns are explicit

Report:
- plan path
- workstream count
- major sequencing constraints
- remaining planning questions, if any
"""
