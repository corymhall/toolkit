# Delivery Workflow
#
# End-to-end delivery in ONE Codex session:
#   bootstrap -> draft-spec -> enrich -> lightweight tracking -> implement
#   -> launch final review -> monitor+synthesize -> verify/finalize
#
# No polecat delegation, no handoff checkpoints. Keeps ownership in one session,
# while still recording status in beads.
#
# Usage:
#   gt sling delivery-workflow <crew> \
#     --var feature="ipv6-support" \
#     --var brief="Add IPv6 CIDR block and subnet support to VPC components" \
#     [--var epic_id="abc123"] \
#     [--var tracking="milestones"]


description = """
Default Codex-native delivery workflow with lightweight Gastown tracking.

Composes eight stages sequentially:
1. **Bootstrap** - ensure root epic + integration branch exist
2. **Draft Spec** - produce `spec.md` with serialized constraints
3. **Enrich** - tighten spec gaps while preserving decisions/traceability
4. **Tracking Setup** - keep status in beads (epic-only or lightweight milestones)
5. **Implement** - execute all work in THIS session (subagents optional)
6. **Launch Final Review** - create a review checkpoint and sling sidecar reviewers
7. **Monitor + Synthesize** - keep monitoring until reviewers reach terminal state, then synthesize findings
8. **Verify + Finalize** - validate, update tracking, and summarize

Use this when you want Codex continuity benefits from a single uninterrupted
thread, but still want visibility in Gastown.

**Input:** Feature name + brief description
**Output:** Implemented feature + updated tracking epic/tasks + verification summary

## Tracking Modes

- `milestones` (default): create a few milestone tasks under the epic
- `epic-only`: keep only the root epic and append progress notes

## Step Lifecycle (Molecule Work Loop)

This formula runs as a molecule - each step is a wisp bead. Use the
standard molecule work loop to advance through steps:

```bash
bd mol current <molecule-id>
# execute the step
bd close <step-id>
bd mol current <molecule-id>
# repeat until complete
```

`bd mol current <molecule-id>` is the sole source of truth for what to do next.
Execute exactly that current wisp and nothing beyond it.

After closing a wisp, stop and re-run `bd mol current <molecule-id>` before
starting anything else. Do not begin the next stage from memory, expected
sequence, prior banner text, or "workflow intent" alone.

Status updates are not pause points. If a wisp tells you to report findings,
state, or completion, do so and then continue the molecule loop immediately
unless the wisp explicitly requires `request_user_input` or says `STOP`.

If a stage expands into more granular wisps, obey those expanded wisps
strictly and individually. Do NOT batch-close steps or work ahead.
"""
formula = "delivery-workflow"
type = "workflow"
pour = true
version = 1

[vars]
[vars.feature]
description = "Feature name (becomes directory name under docs/plans/)"
required = true

[vars.brief]
description = "Feature brief - 1-3 sentences describing what to build"
required = true

[vars.epic_id]
description = "Optional existing root epic ID to reuse"
required = false
default = ""

[vars.tracking]
description = "Tracking mode: milestones (default) or epic-only"
required = false
default = "milestones"


# ============================================================================
# KICKOFF
# ============================================================================

[[steps]]
id = "kickoff"
title = "Delivery Workflow Kickoff"
description = """
═══════════════════════════════════════════════════════════════
 DELIVERY WORKFLOW
 Plan and implement end-to-end in one Codex session.

 Feature:  {{feature}}
 Brief:    {{brief}}
 Tracking: {{tracking}} (empty => milestones)

 Stages:
   1. Bootstrap (epic + integration branch)
   2. Draft Spec (interactive)
   3. Enrich (gap analysis)
   4. Tracking Setup (epic-only or milestone tasks)
   5. Implement (same session, optional subagents)
   6. Launch Final Review (Codex + Claude sidecars, optional specialist)
   7. Monitor + Synthesize
   8. Verify + Finalize

 Artifacts:
   - docs/plans/{{feature}}/spec.md
   - docs/plans/{{feature}}/session-context.md
   - docs/plans/{{feature}}/session-ledger.md
═══════════════════════════════════════════════════════════════

Output this banner to the user, then close this step to begin.
"""

# ============================================================================
# STAGE 1: BOOTSTRAP
# ============================================================================

[[steps]]
id = "stage-bootstrap"
title = "Stage 1: Bootstrap Epic + Integration Branch"
needs = ["kickoff"]
description = """
Ensure this feature has a root epic and integration branch before writing artifacts.

## Branch Safety

Starting on `main`/`master` is allowed only for this bootstrap step.
After bootstrap, switch to the integration branch before writing files.

## Resolve/Create Root Epic

If `epic_id` provided:

```bash
bd show {{epic_id}}
EPIC_ID={{epic_id}}
```

Otherwise, try to reuse one:

```bash
bd list --title-contains "{{feature}}" --type epic
```

If none is suitable, create one:

```bash
EPIC_ID=$(bd create "{{feature}}" -t epic -p P1 -d "Single-session tracked delivery epic for {{feature}}."
  --json | jq -r '.[0].id // .id')
```

## Create/Verify Integration Branch

```bash
gt mq integration create "$EPIC_ID"
gt mq integration status "$EPIC_ID"
# switch to integration branch shown by status output
git switch <integration-branch-from-status-output>
```

## Persist Session Context

```bash
mkdir -p docs/plans/{{feature}}
TRACKING_MODE="{{tracking}}"
if [ -z "$TRACKING_MODE" ]; then TRACKING_MODE="milestones"; fi
cat > docs/plans/{{feature}}/session-context.md <<CTX
feature: {{feature}}
brief: {{brief}}
epic_id: $EPIC_ID
tracking_mode: $TRACKING_MODE
review_categories: all
review_profiles_selected: general
CTX
```

## Output

Report epic ID, integration branch, and tracking mode.
"""

# ============================================================================
# STAGE 2: DRAFT SPEC (expansion placeholder)
# ============================================================================

[[steps]]
id = "stage-draft-spec"
title = "Stage 2: Draft Spec"
needs = ["stage-bootstrap"]
description = """
Placeholder expanded by `draft-spec-expansion`.

Create `docs/plans/{{feature}}/spec.md` with serialized constraints.
"""

# ============================================================================
# STAGE 3: ENRICH (expansion placeholder)
# ============================================================================

[[steps]]
id = "stage-enrich"
title = "Stage 3: Enrich"
needs = ["stage-draft-spec"]
description = """
Placeholder expanded by `enrich-expansion`.

Strengthen `docs/plans/{{feature}}/spec.md` while preserving:
- Non-Negotiables
- Forbidden Approaches
- Decision Log
- Traceability
"""

# ============================================================================
# STAGE 4: LIGHTWEIGHT TRACKING SETUP
# ============================================================================

[[steps]]
id = "stage-tracking-setup"
title = "Stage 4: Lightweight Tracking Setup"
needs = ["stage-enrich"]
description = """
Set up lightweight tracking in beads for this single-session run.

## Inputs

- `docs/plans/{{feature}}/session-context.md`
- `docs/plans/{{feature}}/spec.md`

## Resolve Context

```bash
EPIC_ID=$(awk -F': ' '/^epic_id:/{print $2}' docs/plans/{{feature}}/session-context.md)
TRACKING_MODE=$(awk -F': ' '/^tracking_mode:/{print $2}' docs/plans/{{feature}}/session-context.md)
if [ -z "$TRACKING_MODE" ]; then TRACKING_MODE="milestones"; fi
```

## Always Update Root Epic

Append a planning summary to the root epic:

```bash
bd update "$EPIC_ID" --append-notes "Single-session start:\n- spec: docs/plans/{{feature}}/spec.md\n- mode: $TRACKING_MODE\n- status: planning complete, implementation starting"
```

## If Tracking Mode = milestones

Create only these milestone tasks (skip if a matching child already exists):

1. `{{feature}}: plan locked`
2. `{{feature}}: implementation complete`
3. `{{feature}}: verification complete`
4. `{{feature}}: final cleanup and ship`

Use `bd list --parent "$EPIC_ID" --title-contains ... --json` to avoid duplicates.
Create with `bd create ... --parent "$EPIC_ID" -t task -p P2`.

After creating/finding milestones, close `plan locked` immediately and note:
- Spec path
- Decision Log count
- Non-Negotiables count

## If Tracking Mode = epic-only

Do not create child tasks.
Continue using `bd update "$EPIC_ID" --append-notes ...` for status checkpoints.
"""

# ============================================================================
# STAGE 5: IMPLEMENT IN THIS SESSION
# ============================================================================

[[steps]]
id = "stage-implement"
title = "Stage 5: Implement in this Session"
needs = ["stage-tracking-setup"]
description = """
Implement the feature end-to-end in THIS session. No polecat delegation.

## Rules

- Stay in one session from start to finish.
- Do not dispatch work to external crews/polecats.
- Subagents are allowed only for bounded subtasks (exploration, focused edits,
  targeted tests), with the parent session owning integration.
- Preserve `spec.md` intent while implementing; do not silently violate
  Non-Negotiables or Forbidden Approaches.

## Build a Session Ledger

Create/update `docs/plans/{{feature}}/session-ledger.md` with:
- Current status
- Implementation checklist derived from spec Design
- Milestone self-check entries
- Commands run + outcomes
- Files changed
- Open risks/blockers

Update this ledger after each major implementation slice.

## Select Domain Profiles

Before implementation gets deep, choose the review/implementation domain lens.

Selection order:
1. explicit choice in spec or session context
2. obvious repo/file heuristics
3. default to `general`

Examples:
- Go-heavy work -> `go-development`
- Neovim plugin work -> `neovim-plugin-development`

Record the selected profiles in `session-context.md` and mirror them in the
session ledger. Keep this conservative - choose specialist profiles only when
the signal is strong.

## Execution Loop

1. Read `docs/plans/{{feature}}/spec.md`
2. Before each implementation slice, declare the proof model in `session-ledger.md`
   - default for behavior changes / bug fixes: red-green evidence
   - otherwise: explicit alternate proof model with rationale
3. Execute one implementation slice
4. Run relevant checks for that slice
5. Write a milestone self-check covering:
   - what changed
   - what spec section or decision it satisfied
   - what proof model was declared
   - what evidence actually exists
   - what remains risky or unclear
   - whether the next milestone still makes sense
6. If the slice feels risky, run one bounded drift-review subagent before continuing
7. Update `session-ledger.md`
8. Update beads tracking:
   - milestone mode: set `implementation complete` to in_progress early,
     close when done
   - epic-only mode: append progress note to root epic

Do not treat a milestone as complete if the proof model is missing, vague, or
unsupported by actual evidence.

Prefer small, verified increments over one large final diff.
"""

# ============================================================================
# STAGE 6: FINAL REVIEW LAUNCH
# ============================================================================

[[steps]]
id = "stage-final-review-launch"
title = "Stage 6: Launch Final Review Workers"
needs = ["stage-implement"]
description = """
Create the review checkpoint and launch the explicit end-of-session review workers.

## Visibility Constraint

Fresh slung review workers do not automatically share this session's dirty
workspace state. Before launching sidecar reviewers, ensure the review inputs
are materialized into state they can actually read.

At minimum, that means:
- the spec and supporting review artifacts exist in shared/committed form
- the code to review is visible from the branch/workspace the sidecars will inspect

Do not sling fresh review workers against parent-only untracked artifacts or
local-only dirty changes and assume they can see them.

## Review Checkpoint

Before slinging any final review workers:

1. create a reviewable checkpoint commit
2. push the integration branch
3. materialize shared review inputs under the rig root `.runtime` directory

Suggested shared directory:

```bash
TOP=$(git rev-parse --show-toplevel)
RIG_ROOT=$(printf '%s\n' "$TOP" | sed -E 's#/crew/[^/]+$##; s#/polecats/[^/]+/[^/]+$##')
REVIEW_RUN_ID=$(date +%Y%m%d-%H%M%S)
REVIEW_DIR="$RIG_ROOT/.runtime/reviews/{{feature}}/$REVIEW_RUN_ID"
mkdir -p "$REVIEW_DIR"
cp docs/plans/{{feature}}/spec.md "$REVIEW_DIR/spec.md"
test -f docs/plans/{{feature}}/session-context.md && cp docs/plans/{{feature}}/session-context.md "$REVIEW_DIR/session-context.md"
test -f docs/plans/{{feature}}/session-ledger.md && cp docs/plans/{{feature}}/session-ledger.md "$REVIEW_DIR/session-ledger.md"
git add -A
git commit -m "checkpoint: prepare {{feature}} for external review"
git push
```

The review checkpoint is not final completion. It is the stable state fresh
review workers should inspect.

## Review Inputs

- pushed integration-branch state
- shared review input files under `$REVIEW_DIR`

## Required Review Runs

Always run:
- one general review with `--agent codex`
- one general review with `--agent claude`

Optionally run:
- one specialist review if `review_profiles_selected` contains a strong
  domain-specific profile such as `go-development` or
  `neovim-plugin-development`

## Review Commands

Write reports under:
- `$REVIEW_DIR/codex-review.md`
- `$REVIEW_DIR/claude-review.md`
- optional specialist review report if used

Use the review worker formula:

```bash
gt sling mol-review-implementation <target> --agent codex \
  --var feature="{{feature}}" \
  --var reviewer_label="codex" \
  --var spec_scope="$REVIEW_DIR/spec.md" \
  --var impl_scope="origin/$(git branch --show-current)" \
  --var categories="all" \
  --var review_profile="general" \
  --var output_path="$REVIEW_DIR/codex-review.md"

gt sling mol-review-implementation <target> --agent claude \
  --var feature="{{feature}}" \
  --var reviewer_label="claude" \
  --var spec_scope="$REVIEW_DIR/spec.md" \
  --var impl_scope="origin/$(git branch --show-current)" \
  --var categories="all" \
  --var review_profile="general" \
  --var output_path="$REVIEW_DIR/claude-review.md"
```

If a specialist profile is selected, add one more review run with that profile.
For example:

```bash
REVIEW_PROFILE=$(awk -F': ' '/^review_profiles_selected:/{print $2}' docs/plans/{{feature}}/session-context.md | cut -d',' -f1)
if [ -n "$REVIEW_PROFILE" ] && [ "$REVIEW_PROFILE" != "general" ]; then
  gt sling mol-review-implementation <target> --agent codex \
    --var feature="{{feature}}" \
    --var reviewer_label="$REVIEW_PROFILE" \
    --var spec_scope="$REVIEW_DIR/spec.md" \
    --var impl_scope="origin/$(git branch --show-current)" \
    --var categories="all" \
    --var review_profile="$REVIEW_PROFILE" \
    --var output_path="$REVIEW_DIR/$REVIEW_PROFILE-review.md"
fi
```

## Launch Discipline

Do not blindly fire multiple slings at the same rig target in parallel when an
idle polecat may be reused. Two concurrent slings can race and attach different
review wisps to the same worker.

Preferred approaches:
- use explicit distinct polecat targets, or
- launch the first reviewer, confirm it is working, then launch the second

## Monitoring

Use multiple signals, but treat them differently:

- `gt peek <rig>/<polecat>` is the primary monitoring tool
  - best for seeing whether the worker is actually progressing or just sitting
    at the initial assigned prompt
- `gt polecat status <rig>/<polecat>` is secondary
  - good for lifecycle state, last activity, and clone path
- `gt hook show <rig>/<polecat>` is secondary
  - good for confirming which wisp is currently attached
- `find "$REVIEW_DIR" -type f` is the completion signal
  - use it to detect when review artifacts actually exist

If `gt peek` shows the worker still sitting at the initial assigned prompt,
nudge it explicitly:

```bash
gt nudge <rig>/<polecat> "Run gt hook and execute the hooked mol-review-implementation now. This is a report-only task writing to the shared .runtime review directory; do not commit the report."
```

Do not synthesize review results until the expected shared report files exist
under `$REVIEW_DIR`.

Do not synthesize review results in this step. Launch the workers, record the
worker identities and expected report paths in `session-ledger.md`, then move to
the monitoring step.
"""

# ============================================================================
# STAGE 7: MONITOR + SYNTHESIZE
# ============================================================================

[[steps]]
id = "stage-final-review-monitor"
title = "Stage 7: Monitor Review Workers and Synthesize"
needs = ["stage-final-review-launch"]
description = """
Monitor the launched review workers until each required reviewer reaches a
terminal state, then synthesize the results.

## Primary Monitoring Signal

Treat `gt peek <rig>/<polecat>` as the primary truth source for live progress.
Use it to answer: is the worker actually executing the review, or just sitting
at the initial assigned prompt?

Secondary signals:
- `gt polecat status <rig>/<polecat>` for lifecycle state and last activity
- `gt hook show <rig>/<polecat>` for current hooked wisp
- `find "$REVIEW_DIR" -type f` for actual review artifact existence

## Terminal Conditions

Do not stop monitoring until every required reviewer reaches one of these
terminal conditions:

- the expected report file exists in `$REVIEW_DIR`
- the reviewer wisp is closed
- the reviewer polecat is idle with no hook
- or the reviewer is explicitly classified as stalled/failed after retry policy
  is exhausted

## Monitoring Loop

Keep polling until terminal conditions are met. A typical pass should:

```bash
gt peek <rig>/<polecat>
gt polecat status <rig>/<polecat>
gt hook show <rig>/<polecat>
find "$REVIEW_DIR" -type f | sort
```

Then decide whether to continue waiting, retry, or classify failure.

## Retry Policy

- If `gt peek` shows the worker still at the initial assigned prompt after the
  first wait window, send one explicit nudge
- If it still has not started after the second wait window, classify startup as
  failed and record that in `session-ledger.md`
- If the hook clears but the expected report is missing, inspect the worker
  notes and clone before deciding whether the run failed
- If the worker is clearly making progress, keep monitoring and do not
  summarize yet

Example startup nudge:

```bash
gt nudge <rig>/<polecat> "Run gt hook and execute the hooked mol-review-implementation now. This is a report-only task writing to the shared .runtime review directory; do not commit the report."
```

## Anti-Patterns

Do NOT:
- stop monitoring just because no report exists yet
- summarize intermediate state as final state
- synthesize before reports exist or failures are explicitly classified
- ask the human whether to keep monitoring unless retry policy is exhausted

## Synthesis

After the required reports exist:
- read reports from `$REVIEW_DIR`
- compare findings across reviewers
- deduplicate overlaps
- classify blocking vs non-blocking issues
- inspect `session-ledger.md` to verify the declared proof models were actually
  followed and evidenced
- if a milestone or final state still relies on vague “test later” reasoning,
  treat that as a workflow failure and return to implementation/fix work
- if blocking issues exist, return to implementation/fix work before proceeding
- if reviewers materially disagree, summarize the disagreement clearly
- append the synthesis outcome to `session-ledger.md`
"""

# ============================================================================
# STAGE 8: VERIFY + FINALIZE
# ============================================================================

[[steps]]
id = "stage-verify-finalize"
title = "Stage 8: Verify, Finalize, and Report"
needs = ["stage-final-review-monitor"]
description = """
Run final verification, then finalize tracking state and summary.

## Verification

- Execute relevant test/lint/build commands for changed areas.
- If full suite is too expensive, run targeted commands and state limitations.
- Record all verification commands + outcomes in `session-ledger.md`.

## Tracking Finalization

```bash
EPIC_ID=$(awk -F': ' '/^epic_id:/{print $2}' docs/plans/{{feature}}/session-context.md)
TRACKING_MODE=$(awk -F': ' '/^tracking_mode:/{print $2}' docs/plans/{{feature}}/session-context.md)
```

- `milestones` mode:
  - close `{{feature}}: implementation complete` when code is done
  - close `{{feature}}: verification complete` when validation passes
  - close `{{feature}}: final cleanup and ship` after final summary + push
- `epic-only` mode:
  - append final status note to root epic (implementation + verification complete)

## Final Epic Note

Append to root epic:
- spec path
- ledger path
- review artifact paths
- verification commands run
- unresolved risks (if any)
- completion status

## Output

Provide a concise completion report including:
- what was implemented
- what was verified
- what remains (if anything)
"""

# ============================================================================
# COMPLETE
# ============================================================================

[[steps]]
id = "complete"
title = "Workflow Complete"
needs = ["stage-verify-finalize"]
description = """
Single-session tracking workflow complete.

**Artifacts:**
- docs/plans/{{feature}}/spec.md
- docs/plans/{{feature}}/session-context.md
- docs/plans/{{feature}}/session-ledger.md
- <rig-root>/.runtime/reviews/{{feature}}/<run-id>/*.md

**Tracking:**
- Root epic updated with progress and final summary
- Optional milestone tasks updated/closed (if milestones mode)

**Modeling note:**
This workflow optimizes for single-session continuity while still preserving
lightweight status visibility in Gastown.
"""

# ============================================================================
# COMPOSITION
# ============================================================================

[compose]

[[compose.expand]]
target = "stage-draft-spec"
with = "draft-spec-expansion"

[[compose.expand]]
target = "stage-enrich"
with = "enrich-expansion"
