# Bootstrap Expansion
#
# Shared bootstrap stage for delivery workflows.

description = """
Ensure the feature has a root epic, integration branch, and initial session
context before later stages write planning or execution artifacts.
"""
formula = "bootstrap-expansion"
type = "expansion"
pour = true
version = 1

[vars]
[vars.feature]
description = "Feature name"
required = true

[vars.brief]
description = "Feature brief"
required = true

[vars.epic_id]
description = "Optional existing root epic ID to reuse"
required = false
default = ""

[vars.tracking]
description = "Tracking mode"
required = false
default = "milestones"

[vars.bootstrap_epic_description]
description = "Root epic description used when creating a new epic"
required = false
default = "Tracked delivery epic for {{feature}}."

[vars.delivery_mode_context]
description = "Session-context delivery mode value"
required = false
default = "single-session"

[[template]]
id = "{target}.execute"
title = "Bootstrap Epic + Integration Branch"
description = """
Ensure this feature has a root epic and integration branch before writing artifacts.

## Branch Safety

Starting on `main`/`master` is allowed only for this bootstrap step.
After bootstrap, switch to the integration branch before writing files.

## Resolve/Create Root Epic

If `epic_id` provided:

```bash
bd show {{epic_id}}
EPIC_ID={{epic_id}}
```

Otherwise, try to reuse one:

```bash
bd list --title-contains "{{feature}}" --type epic
```

If none is suitable, create one:

```bash
EPIC_ID=$(bd create "{{feature}}" -t epic -p P1 -d "{{bootstrap_epic_description}}"
  --json | jq -r '.[0].id // .id')
```

## Create/Verify Integration Branch

```bash
gt mq integration create "$EPIC_ID"
gt mq integration status "$EPIC_ID"
# switch to integration branch shown by status output
git switch <integration-branch-from-status-output>
```

## Persist Session Context

```bash
mkdir -p docs/plans/{{feature}}
TRACKING_MODE="{{tracking}}"
if [ -z "$TRACKING_MODE" ]; then TRACKING_MODE="milestones"; fi
cat > docs/plans/{{feature}}/session-context.md <<CTX
feature: {{feature}}
brief: {{brief}}
epic_id: $EPIC_ID
tracking_mode: $TRACKING_MODE
review_categories: all
review_profiles_selected: general
delivery_mode: {{delivery_mode_context}}
CTX
```

## Output

Report epic ID, integration branch, and tracking mode.
"""
