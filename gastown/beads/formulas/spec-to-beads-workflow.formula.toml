# Spec-to-Beads Workflow
#
# Composes all expansion formulas into an end-to-end pipeline:
#   bootstrap → draft-spec → enrich → beadify
#
# For maximum rigor from brief to execution-ready beads.
#
# Usage:
#   gt sling spec-to-beads-workflow <crew> \
#     --var feature="ipv6-support" \
#     --var brief="Add IPv6 CIDR block and subnet support to VPC components" \
#     [--var epic_id="abc123"]

description = """
Full pipeline from brief to execution-ready beads.

Composes four stages sequentially:
1. **Bootstrap** — ensure feature epic + integration branch exist
2. **Draft Spec** — brief → spec.md with required serialized sections
3. **Enrich** — preserve/fill serialized context (gap analysis + decisions)
4. **Beadify** — spec → beads with validated dependency + traceability coverage

Use this when you want the maximum-rigor path from a raw idea to
execution. For lighter workflows, run individual expansions directly.

**Input:** Feature name + brief description
**Output:** Reviewed spec + beads epic with tasks and dependency graph

## Step Lifecycle (Molecule Work Loop)

This formula runs as a molecule — each step is a wisp bead. Use the
standard molecule work loop to advance through steps:

```bash
bd mol current <molecule-id>
# execute the step
bd close <step-id>
bd mol current <molecule-id>
# repeat until complete
```

Do NOT batch-close all steps at the end — close each one as you finish it.
"""
formula = "spec-to-beads-workflow"
type = "workflow"
version = 1

[vars]
[vars.feature]
description = "Feature name (becomes directory name under docs/plans/)"
required = true

[vars.brief]
description = "Feature brief — 1-3 sentences describing what to build"
required = true

[vars.epic_id]
description = "Optional existing root epic ID to reuse (recommended when known)"
required = false


# ============================================================================
# KICKOFF
# ============================================================================

[[steps]]
id = "kickoff"
title = "Spec-to-Beads Kickoff"
description = """
═══════════════════════════════════════════════════════════════
 SPEC-TO-BEADS WORKFLOW
 Full pipeline: bootstrap → brief → spec → enriched spec → beads

 Feature: {{feature}}
 Brief:   {{brief}}

Stages:
   1. Bootstrap — epic + integration branch setup
   2. Draft Spec — codebase exploration + interactive dialogue
   3. Enrich — 6-dimension gap analysis + auto-fix + decisions
   4. Beadify — task decomposition + 3 review passes + bead creation

 Serialized fidelity requirements across stages:
   - Non-Negotiables
   - Forbidden Approaches
   - Decision Log
   - Traceability

 Output:
   - docs/plans/{{feature}}/spec.md (reviewed spec)
   - Beads epic with tasks and dependency graph
═══════════════════════════════════════════════════════════════

Output this banner to the user, then close this step to begin.
"""

# ============================================================================
# STAGE 1: BOOTSTRAP EPIC + INTEGRATION BRANCH
# ============================================================================

[[steps]]
id = "stage-bootstrap"
title = "Stage 1: Bootstrap Epic + Integration Branch"
needs = ["kickoff"]
description = """
Before writing or updating spec artifacts, ensure this feature already has:
1. A root epic (placeholder allowed), and
2. An integration branch created via `gt mq integration`.

## Branch Safety

Starting on `main`/`master` is allowed only for this bootstrap step.
After bootstrap, switch to the integration branch before writing files.

```bash
BRANCH=$(git branch --show-current)
if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
  echo "Starting on $BRANCH. Bootstrap now, then switch to integration branch."
fi
```

## 1) Resolve or Create Root Epic

If `epic_id` was provided, validate and use it:

```bash
bd show {{epic_id}}
EPIC_ID={{epic_id}}
```

Otherwise, try to reuse an existing root epic:

```bash
bd list --title-contains "{{feature}}" --type epic
```

If no suitable root epic exists, create a placeholder:

```bash
bd create "{{feature}}" -t epic -p P1 -d "Placeholder feature epic created during spec-to-beads bootstrap. Details refined during spec + beadify stages."
```

Set `EPIC_ID` to the resolved or newly created root epic ID.

## 2) Create/Verify Integration Branch

```bash
gt mq integration create $EPIC_ID
gt mq integration status $EPIC_ID
```

Read the integration branch name from `status` output, then switch to it:

```bash
git switch <integration-branch-from-status-output>
```

## Output

Report:
- Root epic ID
- Integration branch name
- Pass `--var epic_id="$EPIC_ID"` to direct `beadify` runs when not using this workflow
"""

# ============================================================================
# STAGE 2: DRAFT SPEC (expansion placeholder)
# ============================================================================

[[steps]]
id = "stage-draft-spec"
title = "Stage 2: Draft Spec"
needs = ["stage-bootstrap"]
description = """
Placeholder expanded by `draft-spec-expansion`.

Turn the brief into a first-draft spec through codebase exploration
and interactive dialogue.

**Input:** {{brief}}
**Output:** docs/plans/{{feature}}/spec.md
"""

# ============================================================================
# CHECKPOINT: After Draft Spec
# ============================================================================

[[steps]]
id = "checkpoint-after-draft"
title = "Checkpoint: Spec Drafted"
needs = ["stage-draft-spec"]
description = """
## Checkpoint

Draft spec (Stage 2) is complete.

**Artifact:** docs/plans/{{feature}}/spec.md

Before handoff, verify the artifact contains:
- Non-Negotiables
- Forbidden Approaches
- Decision Log
- Traceability

If any are missing, return to Stage 2 and fill them before handoff.

**If this is your first step in a fresh session**, close this step and continue.

**Otherwise**, cycle your context:
1. Close this step: `bd close <step-id>`
2. Handoff: `gt handoff -s "Spec-to-beads: draft complete" -m "Draft spec written at docs/plans/{{feature}}/spec.md. Next: enrich pass for gap analysis."`
"""

# ============================================================================
# STAGE 3: ENRICH (expansion placeholder)
# ============================================================================

[[steps]]
id = "stage-enrich"
title = "Stage 3: Enrich"
needs = ["checkpoint-after-draft"]
description = """
Placeholder expanded by `enrich-expansion`.

Read the spec, find gaps across 6 dimensions, auto-fix what's obvious,
ask about what needs judgment, fold everything back in.

**Input:** docs/plans/{{feature}}/spec.md
**Output:** Updated docs/plans/{{feature}}/spec.md (enriched)
"""

# ============================================================================
# CHECKPOINT: After Enrich
# ============================================================================

[[steps]]
id = "checkpoint-after-enrich"
title = "Checkpoint: Spec Enriched"
needs = ["stage-enrich"]
description = """
## Checkpoint

Enrich (Stage 3) is complete.

**Artifact:** docs/plans/{{feature}}/spec.md (enriched)

Before handoff, verify enrich preserved:
- Non-Negotiables (still explicit and testable)
- Forbidden Approaches (still explicit)
- Decision Log (stable IDs + rationale)
- Traceability (updated mappings for new/changed sections)

**If this is your first step in a fresh session**, close this step and continue.

**Otherwise**, cycle your context:
1. Close this step: `bd close <step-id>`
2. Handoff: `gt handoff -s "Spec-to-beads: enrich complete" -m "Spec enriched at docs/plans/{{feature}}/spec.md. Next: beadify to create execution beads."`
"""

# ============================================================================
# STAGE 4: BEADIFY (expansion placeholder)
# ============================================================================

[[steps]]
id = "stage-beadify"
title = "Stage 4: Beadify"
needs = ["checkpoint-after-enrich"]
description = """
Placeholder expanded by `beadify-expansion`.

Read the spec, explore the codebase, decompose into tasks, run 3 review
passes, create beads with validated dependencies.

**Input:** docs/plans/{{feature}}/spec.md
**Output:** Beads epic with tasks and dependency graph
"""

# ============================================================================
# COMPLETE
# ============================================================================

[[steps]]
id = "complete"
title = "Workflow Complete"
needs = ["stage-beadify"]
description = """
Spec-to-beads workflow is complete.

**Summary:**
- Stage 1: Epic + integration branch bootstrapped
- Stage 2: Spec drafted from brief (interactive)
- Stage 3: Spec enriched (6-dimension analysis, auto-fixes, decisions)
- Stage 4: Beads created (task decomposition, 3 review passes)
- Fresh-session fidelity: Non-Negotiables + Forbidden Approaches + Decision Log +
  Traceability carried from spec through bead generation

**Artifacts:**
- docs/plans/{{feature}}/spec.md (reviewed spec)
- Beads epic with tasks and dependency graph

**Next steps:**
- Use epic-delivery to dispatch beads to polecats for implementation
- Or start working on ready tasks: `bd ready`
"""

# ============================================================================
# COMPOSITION: Expand placeholder steps
# ============================================================================

[compose]

[[compose.expand]]
target = "stage-draft-spec"
with = "draft-spec-expansion"

[[compose.expand]]
target = "stage-enrich"
with = "enrich-expansion"

[[compose.expand]]
target = "stage-beadify"
with = "beadify-expansion"
