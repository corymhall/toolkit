# Final Review Launch Expansion
#
# Shared final-review launch stage for delivery workflows.

description = """
Launch the explicit end-of-session review workers after creating a stable,
shared review checkpoint.
"""
formula = "final-review-launch-expansion"
type = "expansion"
pour = true
version = 1

[vars]
[vars.feature]
description = "Feature name"
required = true

[[template]]
id = "{target}.execute"
title = "Launch Final Review Workers"
description = """
Create the review checkpoint and launch the explicit end-of-session review workers.

## Visibility Constraint

Fresh slung review workers do not automatically share this session's dirty
workspace state. Before launching sidecar reviewers, ensure the review inputs
are materialized into state they can actually read.

At minimum, that means:
- the spec and supporting review artifacts exist in shared/committed form
- the code to review is visible from the branch/workspace the sidecars will inspect

Do not sling fresh review workers against parent-only untracked artifacts or
local-only dirty changes and assume they can see them.

## Review Checkpoint

Before slinging any final review workers:

1. create a reviewable checkpoint commit
2. push the integration branch
3. materialize shared review inputs under the rig root `.runtime` directory

Suggested shared directory:

```bash
TOP=$(git rev-parse --show-toplevel)
RIG_ROOT=$(printf '%s\n' "$TOP" | sed -E 's#/crew/[^/]+$##; s#/polecats/[^/]+/[^/]+$##')
REVIEW_RUN_ID=$(date +%Y%m%d-%H%M%S)
REVIEW_DIR="$RIG_ROOT/.runtime/reviews/{{feature}}/$REVIEW_RUN_ID"
mkdir -p "$REVIEW_DIR"
cp docs/plans/{{feature}}/spec.md "$REVIEW_DIR/spec.md"
test -f docs/plans/{{feature}}/plans.md && cp docs/plans/{{feature}}/plans.md "$REVIEW_DIR/plans.md"
test -f docs/plans/{{feature}}/session-context.md && cp docs/plans/{{feature}}/session-context.md "$REVIEW_DIR/session-context.md"
test -f docs/plans/{{feature}}/session-ledger.md && cp docs/plans/{{feature}}/session-ledger.md "$REVIEW_DIR/session-ledger.md"
git add -A
git commit -m "checkpoint: prepare {{feature}} for external review"
git push
```

The review checkpoint is not final completion. It is the stable state fresh
review workers should inspect.

## Review Inputs

- pushed integration-branch state
- shared review input files under `$REVIEW_DIR`

## Required Review Runs

Always run:
- one general review with `--agent codex`
- one general review with `--agent claude`

Optionally run:
- one specialist review if `review_profiles_selected` contains a strong
  domain-specific profile such as `go-development` or
  `neovim-plugin-development`

## Review Commands

Write reports under:
- `$REVIEW_DIR/codex-review.md`
- `$REVIEW_DIR/claude-review.md`
- optional specialist review report if used

Use the review worker formula:

```bash
gt sling mol-review-implementation <target> --agent codex \
  --var feature="{{feature}}" \
  --var reviewer_label="codex" \
  --var spec_scope="$REVIEW_DIR/spec.md" \
  --var impl_scope="origin/$(git branch --show-current)" \
  --var categories="all" \
  --var review_profile="general" \
  --var output_path="$REVIEW_DIR/codex-review.md"

gt sling mol-review-implementation <target> --agent claude \
  --var feature="{{feature}}" \
  --var reviewer_label="claude" \
  --var spec_scope="$REVIEW_DIR/spec.md" \
  --var impl_scope="origin/$(git branch --show-current)" \
  --var categories="all" \
  --var review_profile="general" \
  --var output_path="$REVIEW_DIR/claude-review.md"
```

If a specialist profile is selected, add one more review run with that profile.
For example:

```bash
REVIEW_PROFILE=$(awk -F': ' '/^review_profiles_selected:/{print $2}' docs/plans/{{feature}}/session-context.md | cut -d',' -f1)
if [ -n "$REVIEW_PROFILE" ] && [ "$REVIEW_PROFILE" != "general" ]; then
  gt sling mol-review-implementation <target> --agent codex \
    --var feature="{{feature}}" \
    --var reviewer_label="$REVIEW_PROFILE" \
    --var spec_scope="$REVIEW_DIR/spec.md" \
    --var impl_scope="origin/$(git branch --show-current)" \
    --var categories="all" \
    --var review_profile="$REVIEW_PROFILE" \
    --var output_path="$REVIEW_DIR/$REVIEW_PROFILE-review.md"
fi
```

## Launch Discipline

Do not blindly fire multiple slings at the same rig target in parallel when an
idle polecat may be reused. Two concurrent slings can race and attach different
review wisps to the same worker.

Preferred approaches:
- use explicit distinct polecat targets, or
- launch the first reviewer, confirm it is working, then launch the second

## Monitoring

Use multiple signals, but treat them differently:

- `gt peek <rig>/<polecat>` is the primary monitoring tool
  - best for seeing whether the worker is actually progressing or just sitting
    at the initial assigned prompt
- `gt polecat status <rig>/<polecat>` is secondary
  - good for lifecycle state, last activity, and clone path
- `gt hook show <rig>/<polecat>` is secondary
  - good for confirming which wisp is currently attached
- `find "$REVIEW_DIR" -type f` is the completion signal
  - use it to detect when review artifacts actually exist

If `gt peek` shows the worker still sitting at the initial assigned prompt,
nudge it explicitly:

```bash
gt nudge <rig>/<polecat> "Run gt hook and execute the hooked mol-review-implementation now. This is a report-only task writing to the shared .runtime review directory; do not commit the report."
```

Do not synthesize review results until the expected shared report files exist
under `$REVIEW_DIR`.

Do not synthesize review results in this step. Launch the workers, record the
worker identities and expected report paths in `session-ledger.md`, then move to
the monitoring step.
"""
