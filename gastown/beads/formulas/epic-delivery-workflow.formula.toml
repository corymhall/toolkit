# Epic Delivery Workflow
#
# Composes all expansion formulas into an end-to-end pipeline:
#   bootstrap → draft-spec → enrich → decomposition-plan → beadify
#
# For decomposing an umbrella initiative into feature/workstream beads that
# can each be executed with `delivery-workflow`.
#
# Usage:
#   gt sling epic-delivery-workflow <crew> \
#     --var feature="ipv6-support" \
#     --var brief="Add IPv6 CIDR block and subnet support to VPC components" \
#     [--var epic_id="abc123"]

description = """
Umbrella initiative pipeline from brief to feature/workstream beads.

Composes five stages sequentially:
1. **Bootstrap** — ensure feature epic + integration branch exist
2. **Draft Spec** — brief → spec.md with required serialized sections
3. **Enrich** — preserve/fill serialized context (gap analysis + decisions)
4. **Decomposition Plan** — enriched spec → `plan-draft.md` with workstream boundaries and sequencing
5. **Beadify** — spec + plan draft → feature/workstream beads with validated dependency and traceability coverage

Use this when you are decomposing an initiative composed of multiple coherent
features or workstreams. The goal is not implementation-ready microtasks. The
goal is a graph of feature-sized beads that are ready to kick off
`delivery-workflow` independently.

**Input:** Feature name + brief description
**Output:** Reviewed umbrella spec + decomposition plan + beads epic with feature/workstream beads and dependency graph

## Step Lifecycle (Molecule Work Loop)

This formula runs as a molecule — each step is a wisp bead. Use the
standard molecule work loop to advance through steps:

```bash
bd mol current <molecule-id>
# execute the step
bd close <step-id>
bd mol current <molecule-id>
# repeat until complete
```

Do NOT batch-close all steps at the end — close each one as you finish it.
"""
formula = "epic-delivery-workflow"
type = "workflow"
pour = true
version = 1

[vars]
[vars.feature]
description = "Feature name (becomes directory name under docs/plans/)"
required = true

[vars.brief]
description = "Feature brief — 1-3 sentences describing what to build"
required = true

[vars.epic_id]
description = "Optional existing root epic ID to reuse (recommended when known)"
required = false


# ============================================================================
# KICKOFF
# ============================================================================

[[steps]]
id = "kickoff"
title = "Epic Delivery Kickoff"
description = """
═══════════════════════════════════════════════════════════════
 EPIC DELIVERY WORKFLOW
 Full pipeline: bootstrap → brief → umbrella spec → enriched spec → decomposition plan → feature/workstream beads

 Feature: {{feature}}
 Brief:   {{brief}}

Stages:
   1. Bootstrap — epic + integration branch setup
   2. Draft Spec — codebase exploration + interactive dialogue
   3. Enrich — 6-dimension gap analysis + auto-fix + decisions
   4. Decomposition Plan — workstream boundaries + sequencing + cross-cutting concerns
   5. Beadify — feature/workstream decomposition + 3 review passes + bead creation

 Serialized fidelity requirements across stages:
   - Non-Negotiables
   - Forbidden Approaches
   - Decision Log
   - Traceability

 Output:
   - docs/plans/{{feature}}/spec.md (reviewed umbrella spec)
   - docs/plans/{{feature}}/plan-draft.md (reviewed decomposition plan)
   - Beads epic with feature/workstream beads and dependency graph
═══════════════════════════════════════════════════════════════

Output this banner to the user, then close this step to begin.
"""

# ============================================================================
# STAGE 1: BOOTSTRAP EPIC + INTEGRATION BRANCH
# ============================================================================

[[steps]]
id = "stage-bootstrap"
title = "Stage 1: Bootstrap Epic + Integration Branch"
needs = ["kickoff"]
description = """
Before writing or updating spec artifacts, ensure this feature already has:
1. A root epic (placeholder allowed), and
2. An integration branch created via `gt mq integration`.

## Branch Safety

Starting on `main`/`master` is allowed only for this bootstrap step.
After bootstrap, switch to the integration branch before writing files.

```bash
BRANCH=$(git branch --show-current)
if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
  echo "Starting on $BRANCH. Bootstrap now, then switch to integration branch."
fi
```

## 1) Resolve or Create Root Epic

If `epic_id` was provided, validate and use it:

```bash
bd show {{epic_id}}
EPIC_ID={{epic_id}}
```

Otherwise, try to reuse an existing root epic:

```bash
bd list --title-contains "{{feature}}" --type epic
```

If no suitable root epic exists, create a placeholder:

```bash
bd create "{{feature}}" -t epic -p P1 -d "Placeholder feature epic created during epic-delivery bootstrap. Details refined during spec + beadify stages."
```

Set `EPIC_ID` to the resolved or newly created root epic ID.

## 2) Create/Verify Integration Branch

```bash
gt mq integration create $EPIC_ID
gt mq integration status $EPIC_ID
```

Read the integration branch name from `status` output, then switch to it:

```bash
git switch <integration-branch-from-status-output>
```

## Output

Report:
- Root epic ID
- Integration branch name
- Pass `--var epic_id="$EPIC_ID"` to direct `beadify` runs when not using this workflow
"""

# ============================================================================
# STAGE 2: DRAFT SPEC (expansion placeholder)
# ============================================================================

[[steps]]
id = "stage-draft-spec"
title = "Stage 2: Draft Spec"
needs = ["stage-bootstrap"]
description = """
Placeholder expanded by `draft-spec-expansion`.

Turn the brief into a first-draft spec through codebase exploration
and interactive dialogue.

**Input:** {{brief}}
**Output:** docs/plans/{{feature}}/spec.md
"""

# ============================================================================
# CHECKPOINT: After Draft Spec
# ============================================================================

[[steps]]
id = "checkpoint-after-draft"
title = "Checkpoint: Umbrella Spec Drafted"
needs = ["stage-draft-spec"]
description = """
## Checkpoint

Draft spec (Stage 2) is complete.

**Artifact:** docs/plans/{{feature}}/spec.md

Before handoff, verify the artifact contains:
- Non-Negotiables
- Forbidden Approaches
- Decision Log
- Traceability

If any are missing, return to Stage 2 and fill them before handoff.

**If this is your first step in a fresh session**, close this step and continue.

**Otherwise**, cycle your context:
1. Close this step: `bd close <step-id>`
2. Handoff: `gt handoff -s "Epic-delivery: draft complete" -m "Draft umbrella spec written at docs/plans/{{feature}}/spec.md. Next: enrich pass for gap analysis."`
"""

# ============================================================================
# STAGE 3: ENRICH (expansion placeholder)
# ============================================================================

[[steps]]
id = "stage-enrich"
title = "Stage 3: Enrich"
needs = ["checkpoint-after-draft"]
description = """
Placeholder expanded by `enrich-expansion`.

Read the spec, find gaps across 6 dimensions, auto-fix what's obvious,
ask about what needs judgment, fold everything back in.

**Input:** docs/plans/{{feature}}/spec.md
**Output:** Updated docs/plans/{{feature}}/spec.md (enriched)
"""

# ============================================================================
# CHECKPOINT: After Enrich
# ============================================================================

[[steps]]
id = "checkpoint-after-enrich"
title = "Checkpoint: Umbrella Spec Enriched"
needs = ["stage-enrich"]
description = """
## Checkpoint

Enrich (Stage 3) is complete.

**Artifact:** docs/plans/{{feature}}/spec.md (enriched)

Before handoff, verify enrich preserved:
- Non-Negotiables (still explicit and testable)
- Forbidden Approaches (still explicit)
- Decision Log (stable IDs + rationale)
- Traceability (updated mappings for new/changed sections)

**If this is your first step in a fresh session**, close this step and continue.

**Otherwise**, cycle your context:
1. Close this step: `bd close <step-id>`
2. Handoff: `gt handoff -s "Epic-delivery: enrich complete" -m "Umbrella spec enriched at docs/plans/{{feature}}/spec.md. Next: generate decomposition plan before beadify."`
"""

# ============================================================================
# STAGE 4: DECOMPOSITION PLAN (expansion placeholder)
# ============================================================================

[[steps]]
id = "stage-decomposition-plan"
title = "Stage 4: Decomposition Plan"
needs = ["checkpoint-after-enrich"]
description = """
Placeholder expanded by `decomposition-plan-expansion`.

Read the enriched umbrella spec, separate it into coherent feature/workstream
boundaries, and generate a reviewed `plan-draft.md`.

**Input:** docs/plans/{{feature}}/spec.md
**Output:** docs/plans/{{feature}}/plan-draft.md
"""

# ============================================================================
# CHECKPOINT: After Decomposition Plan
# ============================================================================

[[steps]]
id = "checkpoint-after-plan"
title = "Checkpoint: Decomposition Plan Ready"
needs = ["stage-decomposition-plan"]
description = """
## Checkpoint

Decomposition plan (Stage 4) is complete.

**Artifact:** docs/plans/{{feature}}/plan-draft.md

Before handoff, verify:
- workstream boundaries are coherent
- major sequencing constraints are documented
- cross-cutting concerns are explicit
- the plan is ready to guide bead creation

**If this is your first step in a fresh session**, close this step and continue.

**Otherwise**, cycle your context:
1. Close this step: `bd close <step-id>`
2. Handoff: `gt handoff -s "Epic-delivery: decomposition plan complete" -m "Decomposition plan written at docs/plans/{{feature}}/plan-draft.md. Next: beadify using the enriched spec plus plan draft."`
"""

# ============================================================================
# STAGE 5: BEADIFY (expansion placeholder)
# ============================================================================

[[steps]]
id = "stage-beadify"
title = "Stage 5: Beadify"
needs = ["checkpoint-after-plan"]
description = """
Placeholder expanded by `beadify-expansion`.

Read the spec, optional decomposition plan, explore the codebase, decompose
into tasks, run 3 review passes, and create feature/workstream beads with
validated dependencies.

**Input:** docs/plans/{{feature}}/spec.md (+ docs/plans/{{feature}}/plan-draft.md if present)
**Output:** Beads epic with feature/workstream beads and dependency graph
"""

# ============================================================================
# COMPLETE
# ============================================================================

[[steps]]
id = "complete"
title = "Workflow Complete"
needs = ["stage-beadify"]
description = """
Epic-delivery workflow is complete.

**Summary:**
- Stage 1: Epic + integration branch bootstrapped
- Stage 2: Umbrella spec drafted from brief (interactive)
- Stage 3: Umbrella spec enriched (6-dimension analysis, auto-fixes, decisions)
- Stage 4: Decomposition plan created (`plan-draft.md`)
- Stage 5: Feature/workstream beads created (decomposition, 3 review passes)
- Fresh-session fidelity: Non-Negotiables + Forbidden Approaches + Decision Log +
  Traceability carried from spec and plan through bead generation

**Artifacts:**
- docs/plans/{{feature}}/spec.md (reviewed umbrella spec)
- docs/plans/{{feature}}/plan-draft.md (reviewed decomposition plan)
- Beads epic with feature/workstream beads and dependency graph

**Next steps:**
- For each coherent feature bead, run `delivery-workflow`
- Use epic-delivery to dispatch implementation once feature beads are ready
"""

# ============================================================================
# COMPOSITION: Expand placeholder steps
# ============================================================================

[compose]

[[compose.expand]]
target = "stage-draft-spec"
with = "draft-spec-expansion"

[[compose.expand]]
target = "stage-enrich"
with = "enrich-expansion"

[[compose.expand]]
target = "stage-decomposition-plan"
with = "decomposition-plan-expansion"

[[compose.expand]]
target = "stage-beadify"
with = "beadify-expansion"
