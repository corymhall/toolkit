# Local sample city for the gascity pack family.
#
# This file is intentionally shape-first. It documents how the local `base`,
# `work`, and `personal` packs are expected to compose in this repo.

[workspace]
name = "city"
provider = "codex"
includes = ["../../packs/base"]

[daemon]
patrol_interval = "30s"
max_restarts = 3
restart_window = "15m"
shutdown_timeout = "10s"

[[rigs]]
name = "example-work-repo"
path = "/path/to/example-work-repo"
includes = ["../../packs/work"]
suspended = true

[[rigs]]
name = "example-personal-repo"
path = "/path/to/example-personal-repo"
includes = ["../../packs/personal"]
suspended = false

# See `rigs-work.toml` and `rigs-personal.toml` for the same examples split into
# smaller reviewable fragments.
