# Example personal-rig fragment for the local sample city.
#
# This is a shape artifact for M1. The intent is to show that `personal`
# behavior is selected through config, not by mutating the shared `base` pack.

[[rigs]]
name = "example-personal-repo"
path = "/path/to/example-personal-repo"
includes = ["../../packs/base", "../../packs/personal"]
suspended = false
