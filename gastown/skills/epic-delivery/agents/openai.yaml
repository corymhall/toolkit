interface:
  display_name: "Epic Delivery"
  short_description: "Execute a planned delivery epic in the current session with a staged convoy as tracking"
  default_prompt: "Use $epic-delivery to reuse or stage the convoy for this epic, validate the execution bead graph, persist and respect validation_bead_id when present, work the ready tracked beads in this same session, and close the convoy when the tracked execution beads plus any convoy-added capstone validation bead are done. Do not run gt convoy launch or gt mq integration land."
