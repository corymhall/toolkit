# Final Review Launch Expansion
#
# Shared final-review launch stage for delivery workflows.

description = """
Launch the explicit end-of-session review workers after creating a stable,
shared review checkpoint.
"""
formula = "final-review-launch-expansion"
type = "expansion"
pour = true
version = 1

[vars]
[vars.feature]
description = "Feature name"
required = true

[[template]]
id = "{target}.execute"
title = "Launch Final Review Workers"
description = """
Create the review checkpoint and launch the explicit end-of-session review workers.

## Visibility Constraint

Fresh slung review workers do not automatically share this session's dirty
workspace state. Before launching sidecar reviewers, ensure the review inputs
are materialized into state they can actually read.

At minimum, that means:
- the spec and supporting review artifacts exist in shared/committed form
- the code to review is visible from the branch/workspace the sidecars will inspect

Do not sling fresh review workers against parent-only untracked artifacts or
local-only dirty changes and assume they can see them.

## Review Checkpoint

Before slinging any final review workers:

1. create a reviewable checkpoint commit
2. push the current review branch
3. materialize shared review inputs under the rig root `.runtime` directory

Suggested shared directory:

```bash
TOP=$(git rev-parse --show-toplevel)
RIG_ROOT=$(printf '%s\n' "$TOP" | sed -E 's#/crew/[^/]+$##; s#/polecats/[^/]+/[^/]+$##')
RIG_NAME=$(basename "$RIG_ROOT")
REVIEW_RUN_ID=$(date +%Y%m%d-%H%M%S)
REVIEW_DIR="$RIG_ROOT/.runtime/reviews/{{feature}}/$REVIEW_RUN_ID"
mkdir -p "$REVIEW_DIR"
cp docs/plans/{{feature}}/spec.md "$REVIEW_DIR/spec.md"
test -f docs/plans/{{feature}}/plans.md && cp docs/plans/{{feature}}/plans.md "$REVIEW_DIR/plans.md"
test -f docs/plans/{{feature}}/session-context.md && cp docs/plans/{{feature}}/session-context.md "$REVIEW_DIR/session-context.md"
test -f docs/plans/{{feature}}/session-ledger.md && cp docs/plans/{{feature}}/session-ledger.md "$REVIEW_DIR/session-ledger.md"
git add -A
git commit -m "checkpoint: prepare {{feature}} for external review"
git push
```

The review checkpoint is not final completion. It is the stable state fresh
review workers should inspect.

## Review Inputs

- pushed branch state
- shared review input files under `$REVIEW_DIR`

## Required Review Runs

Always run:
- one general review through the rig's `reviewer` pool
- one general review through the rig's `reviewer-claude` pool

Optionally run:
- one specialist review if `review_profiles_selected` contains a strong
  domain-specific profile such as `go-development` or
  `neovim-plugin-development`

## Review Commands

Use the review worker formula:

```bash
CODEX_LAUNCH=$(gc sling "$RIG_NAME/reviewer" mol-review-implementation --formula --nudge \
  --var feature="{{feature}}" \
  --var reviewer_label="codex" \
  --var spec_scope="$REVIEW_DIR/spec.md" \
  --var impl_scope="origin/$(git branch --show-current)" \
  --var categories="all" \
  --var review_profile="general" \
  --var report_to="$BD_ACTOR")
CODEX_REVIEW_ID=$(printf '%s\n' "$CODEX_LAUNCH" | awk '/Started workflow/{print $3; exit}')
printf '%s\n' "$CODEX_LAUNCH"

CLAUDE_LAUNCH=$(gc sling "$RIG_NAME/reviewer-claude" mol-review-implementation --formula --nudge \
  --var feature="{{feature}}" \
  --var reviewer_label="claude" \
  --var spec_scope="$REVIEW_DIR/spec.md" \
  --var impl_scope="origin/$(git branch --show-current)" \
  --var categories="all" \
  --var review_profile="general" \
  --var report_to="$BD_ACTOR")
CLAUDE_REVIEW_ID=$(printf '%s\n' "$CLAUDE_LAUNCH" | awk '/Started workflow/{print $3; exit}')
printf '%s\n' "$CLAUDE_LAUNCH"
```

If a specialist profile is selected, add one more review run with that profile.
For example:

```bash
REVIEW_PROFILE=$(awk -F': ' '/^review_profiles_selected:/{print $2}' docs/plans/{{feature}}/session-context.md | cut -d',' -f1)
if [ -n "$REVIEW_PROFILE" ] && [ "$REVIEW_PROFILE" != "general" ]; then
  SPECIALIST_LAUNCH=$(gc sling "$RIG_NAME/reviewer" mol-review-implementation --formula --nudge \
    --var feature="{{feature}}" \
    --var reviewer_label="$REVIEW_PROFILE" \
    --var spec_scope="$REVIEW_DIR/spec.md" \
    --var impl_scope="origin/$(git branch --show-current)" \
    --var categories="all" \
    --var review_profile="$REVIEW_PROFILE" \
    --var report_to="$BD_ACTOR")
  SPECIALIST_REVIEW_ID=$(printf '%s\n' "$SPECIALIST_LAUNCH" | awk '/Started workflow/{print $3; exit}')
  printf '%s\n' "$SPECIALIST_LAUNCH"
fi
```

The `Started workflow <id> ...` line gives you the review bead ID. Record those
IDs in `session-ledger.md`; parent-side monitoring should key off the bead IDs,
not scratch output files.

## Launch Discipline

Do not assume the same reviewer instance will pick up every review. Pool-based
reviewers claim work via pool labels, so think in terms of review beads and
session aliases rather than one fixed worker identity.

## Monitoring

Use multiple signals, but treat them differently:

- `bd show <review-bead-id>` is the primary completion signal
  - use it to confirm the review bead is closed and contains notes
- `gc status --json` is the primary session discovery surface
  - use it to find running `reviewer-*` and `reviewer-claude-*` session aliases
- `gc session peek <session-alias>` is the primary live-progress tool
  - use it to see whether the reviewer is actively reading files or writing notes
- `bd show <review-bead-id> --json` is the canonical report-read signal
  - use it to confirm `review.report_status=written` and inspect the note body

Review workers are often slow because they are doing real file reads and
comparison work. Expect a normal lane to take 10-20 minutes. Do not classify a
reviewer as "stuck" after a few seconds or a single fast poll.

Minimum patience rules:
- after launch, give the worker roughly 2 minutes before the first real
  progress judgment unless you already have a hard failure signal
- if the worker has started reviewing, keep waiting while `gc session peek` shows file
  reads, tool use, or report-writing progress
- only classify a started worker as stalled after at least 10 minutes with no
  visible progress, or after an explicit hard failure
- if the worker is merely sitting at the initial assigned prompt, use the
  explicit nudge below before considering failure

If `gc session peek` shows the worker still sitting at the initial assigned prompt,
nudge it explicitly:

```bash
gc session nudge <session-alias> "Run gc hook and execute the assigned mol-review-implementation now. This is a report-only task writing to the shared .runtime review directory; do not commit the report."
```

Do not synthesize review results until the expected reports exist on the
corresponding review beads.

Do not treat parent-session synthesis as a substitute for the required Codex
review report. If the Codex sidecar did not produce its report, record that as
an incomplete/failed lane.

Do not synthesize review results in this step. Launch the workers, record the
worker identities and review bead IDs in `session-ledger.md`, then move to the
monitoring step.
"""
