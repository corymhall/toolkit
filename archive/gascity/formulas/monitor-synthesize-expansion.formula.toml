# Monitor + Synthesize Expansion
#
# Shared final-review monitoring and synthesis stage for delivery workflows.

description = """
Monitor launched review workers until terminal conditions are met, then
synthesize the results.
"""
formula = "monitor-synthesize-expansion"
type = "expansion"
pour = true
version = 1

[vars]
[vars.feature]
description = "Feature name"
required = true

[[template]]
id = "{target}.execute"
title = "Monitor Review Workers and Synthesize"
description = """
Monitor the launched review workers until each required reviewer reaches a
terminal state, then synthesize the results.

## Primary Monitoring Signal

Treat `gc session peek <session-alias>` as the primary truth source for live
progress.
Use it to answer: is the worker actually executing the review, or just sitting
at the initial assigned prompt?

Secondary signals:
- `gc status --json` to discover the claimed reviewer session alias and current
  state
- `gc session peek <session-alias>` for the current visible prompt and progress
- `bd show <review-bead-id> --json` for actual review-note existence

## Terminal Conditions

Do not stop monitoring until every required reviewer reaches one of these
terminal conditions:

- the expected review bead is closed with notes + `review.report_status=written`
- the reviewer wisp is closed
- the reviewer polecat is idle with no hook
- or the reviewer is explicitly classified as stalled/failed after retry policy
  is exhausted

## Monitoring Loop

Keep polling until terminal conditions are met. A typical pass should:

```bash
gc session peek <session-alias>
gc status --json
bd show <review-bead-id>
```

Then decide whether to continue waiting, retry, or classify failure.

## Retry Policy

- Treat a "wait window" as a real monitoring interval of roughly 2 minutes, not
  a few seconds.
- If `gc session peek` shows the worker still at the initial assigned prompt
  after the first wait window, send one explicit nudge
- If it still has not started after the second wait window, classify startup as
  failed and record that in `session-ledger.md`
- If the hook clears but the expected bead notes are missing, inspect the worker
  notes and clone before deciding whether the run failed
- If the worker is clearly making progress, keep monitoring and do not
  summarize yet
- Once a worker has actually started reviewing, do not classify it as stalled
  unless there has been at least 10 minutes of no visible progress or you have
  an explicit hard failure signal
- Review runs commonly take 10-20 minutes overall; patience is the default

Example startup nudge:

```bash
gc session nudge <session-alias> "Run gc hook and execute the hooked mol-review-implementation now. This is a report-only task writing to the shared .runtime review directory; do not commit the report."
```

## Anti-Patterns

Do NOT:
- stop monitoring just because no notes exist yet
- summarize intermediate state as final state
- synthesize before review bead notes exist or failures are explicitly classified
- ask the human whether to keep monitoring unless retry policy is exhausted
- replace a missing Codex review lane with an informal parent-session
  "self review"

## Synthesis

After the required sidecar reports exist on their review beads:
- read the review bead notes
- compare findings across reviewers
- deduplicate overlaps
- classify blocking vs non-blocking issues
- inspect `session-ledger.md` to verify the declared proof models were actually
  followed and evidenced
- if `plans.md` exists, inspect whether implementation drifted materially from it
- if a milestone or final state still relies on vague “test later” reasoning,
  treat that as a workflow failure and return to implementation/fix work
- if blocking issues exist, return to implementation/fix work before proceeding
- if reviewers materially disagree, summarize the disagreement clearly
- append the synthesis outcome to `session-ledger.md`
"""
