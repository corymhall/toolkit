description = """
Local work-pack branch-ready lifecycle.

This formula creates or reuses a bead-scoped worktree and feature branch,
implements the assignment, records durable metadata on the bead, and stops at
the branch-ready handoff boundary.

The worker always pushes the prepared branch to `origin`, but it must never
push or merge directly to the target branch. Follow-on PR/review and fixup work
belongs to downstream workflow beads, not this formula.

The overall step shape borrows from the built-in `mol-polecat-base` /
`mol-polecat-work` flow, but stops before refinery or merge-oriented behavior.

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| issue | auto/caller | The work bead ID assigned to this worker |
| base_branch | auto/caller | Target branch to branch from and later review against |
| none beyond `issue` / `base_branch` | | Branch naming, push behavior, resume posture, and handoff note are built in |

`gc sling` auto-populates `issue` and `base_branch` for attached work.
"""
formula = "mol-work-branch-ready"
version = 1

[vars]
[vars.issue]
description = "The work bead ID assigned to this worker"
required = true

[vars.base_branch]
description = "The branch this work ultimately targets"
default = "main"

[[steps]]
id = "load-context"
title = "Load context and understand the assignment"
description = """
Initialize the session and inspect the bead metadata that governs resumable
work.

**1. Refresh local execution state directly:**
```bash
bd prime
```

**2. Read the assignment and current metadata:**
```bash
bd show {{issue}}
bd show {{issue}} --json | jq '.metadata'
```

Focus on these fields:
- `work_dir`
- `branch`
- `target`
- `push_remote`
- `base_branch`
- `rejection_reason`

**3. Confirm the work protocol before editing:**
- larger work stays with the owner session
- this worker stops at the prepared-branch / resumable handoff boundary
- direct push or merge to `{{base_branch}}` is forbidden

**4. Check mail for supplemental context:**
```bash
gc mail inbox
```

Do not rerun `gc prime` here; it only reprints the startup prompt. Recover by
reading the bead, metadata, git state, and mail directly.

**Exit criteria:** You understand the assignment, the current bead metadata,
and the branch-only stop boundary."""

[[steps]]
id = "workspace-setup"
title = "Create or reuse the bead-scoped worktree and branch"
needs = ["load-context"]
description = """
Create or resume the durable workspace recorded on the bead.

**Config: requested base_branch = {{base_branch}}**

**1. Resolve a usable remote base branch:**
```bash
REQUESTED_BASE="{{base_branch}}"
BASE_BRANCH="$REQUESTED_BASE"
git -C "$GC_RIG_ROOT" fetch --prune origin
if ! git -C "$GC_RIG_ROOT" rev-parse --verify --quiet "refs/remotes/origin/$BASE_BRANCH" >/dev/null; then
  FALLBACK_BASE=$(git -C "$GC_RIG_ROOT" remote show origin | awk '/HEAD branch/ {print $NF; exit}')
  if [ -z "$FALLBACK_BASE" ]; then
    FALLBACK_BASE=$(git -C "$GC_RIG_ROOT" symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's#^refs/remotes/origin/##')
  fi
  if [ -n "$FALLBACK_BASE" ]; then
    BASE_BRANCH="$FALLBACK_BASE"
  fi
fi
git -C "$GC_RIG_ROOT" fetch --prune origin "$BASE_BRANCH"
```

**2. Resolve the durable worktree path:**
```bash
WORKTREE=$(bd show {{issue}} --json | jq -r '.metadata.work_dir // empty')
if [ -z "$WORKTREE" ]; then
  WORKTREE="$GC_RIG_ROOT/.gc/worktrees/{{issue}}"
fi
mkdir -p "$(dirname "$WORKTREE")"
```

If the recorded worktree exists, reuse it:
```bash
if [ -d "$WORKTREE/.git" ] || git -C "$WORKTREE" rev-parse --show-toplevel >/dev/null 2>&1; then
  cd "$WORKTREE"
else
  git -C "$GC_RIG_ROOT" worktree add "$WORKTREE" --detach "origin/$BASE_BRANCH"
  cd "$WORKTREE"
fi
bd update {{issue}} --set-metadata work_dir="$WORKTREE"
bd update {{issue}} --set-metadata base_branch="$BASE_BRANCH"
bd update {{issue}} --set-metadata target="$BASE_BRANCH"
```

**3. Resolve the feature branch:**
```bash
BRANCH=$(bd show {{issue}} --json | jq -r '.metadata.branch // empty')
if [ -z "$BRANCH" ]; then
  BRANCH="corymhall/{{issue}}"
fi
```

If the branch exists locally, reuse it:
```bash
if git show-ref --verify --quiet "refs/heads/$BRANCH"; then
  git checkout "$BRANCH"
elif git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
  git checkout -b "$BRANCH" "origin/$BRANCH"
else
  git checkout -B "$BRANCH" "origin/$BASE_BRANCH"
fi
bd update {{issue}} --set-metadata branch="$BRANCH"
```

**4. Record push behavior:**
```bash
bd update {{issue}} --set-metadata push_remote="origin"
```

**Exit criteria:** You are inside the bead-scoped worktree, on the feature
branch, with durable metadata updated on the bead."""

[[steps]]
id = "preflight-tests"
title = "Run preflight checks on the worktree"
needs = ["workspace-setup"]
description = """
Verify the codebase is healthy enough to start the assigned change.

Use the repo's own instructions (`AGENTS.md`, `CLAUDE.md`, README, package
scripts, Makefile, etc.) to determine the right preflight checks for this repo.

Run the repo-appropriate preflight checks before starting implementation. For
example, that may mean setup/install plus one or more lint/typecheck/test
commands, but the formula intentionally does not prescribe them.

Record in your notes what you ran and whether anything is already broken on
`{{base_branch}}`.

If pre-existing failures block the work, file a separate bead rather than
folding unrelated repair work into this branch.

Helpful pattern:
```bash
bd update {{issue}} --notes "Preflight: <commands run>; result: <summary>"
```

**Exit criteria:** Preflights are complete and you can start implementation with
a known baseline."""

[[steps]]
id = "implement"
title = "Implement the assigned change on the feature branch"
needs = ["preflight-tests"]
description = """
Implement the requested change within the bead-scoped worktree.

Working rules:
- stay inside `metadata.work_dir`
- keep the change scoped to the assigned bead
- commit focused checkpoints as you go
- do not push or merge directly to `{{base_branch}}`

Helpful checkpoints:
```bash
git status
git add <files>
git commit -m "<type>: <description> ({{issue}})"
```

If you discover related but out-of-scope work, file a follow-up bead rather
than broadening this branch.

**Exit criteria:** The assigned implementation is complete and committed on the
feature branch."""

[[steps]]
id = "self-review"
title = "Review the branch and run quality checks"
needs = ["implement"]
description = """
Review the branch against the recorded base branch and run the configured quality
checks.

Use the repo's own instructions (`AGENTS.md`, `CLAUDE.md`, README, package
scripts, Makefile, etc.) to choose the right verification commands for this
repo.

**1. Review the branch diff:**
```bash
BASE_BRANCH=$(bd show {{issue}} --json | jq -r '.[0].metadata.base_branch // "{{base_branch}}"')
git diff --stat "origin/$BASE_BRANCH...HEAD"
git log --oneline "origin/$BASE_BRANCH..HEAD"
```

**2. Run repo-appropriate verification:**
```bash
# run the commands this repo expects before handoff
```

Record what you ran and the result in bead notes before closing the
implementation bead.

**3. Ensure a clean working tree before handoff:**
```bash
git status --porcelain
```
If anything remains uncommitted, either commit it or remove the accidental
change intentionally. Do not leave hidden local state behind.

**Exit criteria:** The branch is reviewed, checks pass, and the worktree is
clean."""

[[steps]]
id = "record-handoff"
title = "Record branch-ready handoff metadata and stop"
needs = ["self-review"]
description = """
Close the implementation bead at the branch-ready handoff boundary.

This step always pushes the feature branch to `origin`, but it never pushes to
`{{base_branch}}` and it never creates or updates a PR.

**1. Capture final branch metadata:**
```bash
BRANCH=$(git branch --show-current)
WORKTREE=$(pwd)
BASE_BRANCH=$(bd show {{issue}} --json | jq -r '.[0].metadata.base_branch // "{{base_branch}}"')
bd update {{issue}} --set-metadata branch="$BRANCH"
bd update {{issue}} --set-metadata work_dir="$WORKTREE"
bd update {{issue}} --set-metadata target="$BASE_BRANCH"
bd update {{issue}} --set-metadata base_branch="$BASE_BRANCH"
```

**2. Push the feature branch to `origin`:**
```bash
git push origin "HEAD:$BRANCH"
bd update {{issue}} --set-metadata push_remote="origin"
```

**3. Close the implementation bead with a handoff note:**
```bash
BASE_BRANCH=$(bd show {{issue}} --json | jq -r '.[0].metadata.base_branch // "{{base_branch}}"')
bd update {{issue}} --notes "Prepared branch-ready handoff. Branch $BRANCH pushed to origin and targets $BASE_BRANCH."
bd close {{issue}}
```

Later PR/review/fixup stages should continue from this metadata, not from a
surviving worker session.

**4. Drain and exit:**
```bash
gc runtime drain-ack
```

Run the drain command and nothing else.

**Exit criteria:** The bead is closed with durable branch metadata and the
session is drained at the handoff boundary."""
