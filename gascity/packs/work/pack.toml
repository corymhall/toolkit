[pack]
name = "work"
version = "0.1.0"
schema = 1
includes = ["../base"]

# Conservative work-repo worker defaults.
[formulas]
dir = "formulas"

[[agent]]
name = "owner"
scope = "rig"
suspended = true
work_dir = "crews/{{.Rig}}/{{.AgentBase}}"
pre_start = ["{{.ConfigDir}}/scripts/ensure-agent-clone.sh {{.RigRoot}} {{.WorkDir}} --sync"]
prompt_template = "prompts/owner-work-v2.md.tmpl"
nudge = "Review the current work, partner with the human, and own larger tasks end-to-end."

[[agent]]
name = "worker"
scope = "rig"
work_dir = ".gc/agents/{{.Rig}}/workers/{{.AgentBase}}"
prompt_template = "prompts/worker.md.tmpl"
nudge = "Check your hook, prepare or resume the branch-ready worktree, and stop at the handoff boundary."
idle_timeout = "2h"
default_sling_formula = "mol-work-branch-ready"
[agent.pool]
min = 0
max = 2

[[agent]]
name = "triage"
scope = "rig"
work_dir = ".gc/agents/{{.Rig}}/triagers/{{.AgentBase}}"
prompt_template = "prompts/triage.md.tmpl"
nudge = "Check your hook, investigate the assigned issue, record a durable triage report, and stop without pushing."
idle_timeout = "90m"
default_sling_formula = "mol-triage-work"
[agent.pool]
min = 0
max = 2

[[agent]]
name = "triagev2"
scope = "rig"
provider = "codex"
args = ["--profile", "triage", "-c", "default_permissions=triage-net"]
env = { PULUMI_ACCESS_TOKEN = "$PULUMI_WORK_TOKEN" }
work_dir = "{{.RigRoot}}"
prompt_template = "prompts/triage-v2.md.tmpl"
nudge = "Check your hook, investigate the assigned issue, record a durable triage report, and stop without pushing."
[agent.pool]
min = 0
max = 5
