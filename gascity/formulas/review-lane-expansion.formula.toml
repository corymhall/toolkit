# Review Lane Expansion
#
# Minimal expansion fragment for one dynamic review lane spawned by
# graph.v2 on_complete fanout.

description = """
Reusable review-lane fragment for graph.v2 fanout.

The parent workflow prepares prompt files, emits a review manifest as
`gc.output_json`, and lets on-complete fanout materialize one review bead per
lane. Each review lane writes a durable markdown report onto the review bead
itself, which the parent synthesis step reads after the fanout control closes.
"""
formula = "review-lane-expansion"
type = "expansion"
version = 2

[vars.title]
description = "Review lane title"
required = true

[vars.prompt_path]
description = "Path to the markdown prompt or brief for this review lane"
required = true

[vars.reviewer_target]
description = "Optional explicit reviewer assignee/target for this lane"
default = "reviewer"

[[template]]
id = "{target}.review"
title = "{{title}}"
assignee = "{reviewer_target}"
metadata = { "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.continuation_group" = "main", "gc.session_affinity" = "require" }
description = """
Run this review lane independently.

## Inputs

- review brief: `{{prompt_path}}`

## Instructions

1. Read `{{prompt_path}}` fully before reviewing.
2. Produce a markdown report that answers the requested brief.
3. Append the full report to this review bead's notes:

```bash
bd update "$GC_BEAD_ID" --append-notes "$(cat <<'EOF'
<full markdown review>
EOF
)"
```

4. If you need structured degraded-state metadata, record it on this bead.
5. Close the bead when the report is complete.

## Rules

- Do not edit the product files for the parent workflow.
- Do not create or modify extra beads.
- Keep the review scoped to the assigned brief.
- If you could not complete the review, say so explicitly in the bead notes.
"""
