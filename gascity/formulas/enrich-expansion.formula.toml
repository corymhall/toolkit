# Enrich Formula
#
# Read a spec, find gaps, fix what's obvious, ask about what's not,
# fold everything back into the spec. Can run multiple times — each
# pass makes the spec better.
#
# Steps:
#   1. Validate spec exists
#   2. Codebase exploration (understand what's real)
#   3. Analyze spec across 6 dimensions
#   4. Auto-fix obvious gaps
#   5. Present ambiguities and decisions to human
#   6. Fold answers into spec
#   7. Cleanup transient files
#
# Usage:
#   gc sling <target> enrich-expansion --formula --var feature="ipv6-support"
#
# Run it once for a quick pass, or multiple times to iteratively
# deepen a thin spec into a thorough one.

description = """
Read a spec, make it better. Uses separate slung reviewer sessions to find
gaps, fixes what's obvious, asks about what needs human judgment, and folds
everything back into the spec while preserving serialized context for
fresh-session delegation.

**Input:** docs/plans/{{feature}}/spec.md (any depth)
**Output:** Updated docs/plans/{{feature}}/spec.md (enriched)

Works on any spec regardless of depth:
- Thin spec (10 lines): surfaces many gaps, asks several decisions → substantial enrichment
- Deep spec (200 lines): finds subtle issues, confirms most things are solid → light polish

Can be run multiple times. Each pass finds what the previous pass missed
or what new content introduced. Converges naturally — a second pass on a
well-enriched spec will find little to change.

## Analysis Dimensions

Instead of generating exhaustive question lists, enrich analyzes the spec
through 6 analytical lenses that surface only real gaps:

1. **Completeness** — What's missing that would block implementation?
2. **Ambiguity** — What could be interpreted two different ways?
3. **Feasibility** — What's technically hard or impossible given the codebase?
4. **Scope** — Is the boundary clear? Is anything in scope that shouldn't be?
5. **Risks** — What could go wrong that isn't acknowledged?
6. **Consistency** — Does the spec contradict itself or the codebase?

Each finding is classified as:
- **Auto-fix**: Obvious answer exists (best practice, codebase convention, logical implication) → fix silently
- **Decision**: Multiple valid approaches, needs human input → ask

## Execution Style

Use separate reviewer sessions for the main enrichment analysis. The parent
session owns synthesis, auto-fixes, and decision handling.
- Prioritize outcome, constraints, inputs, and artifacts.
- Materialize review inputs into a shared `.runtime` directory before slinging
  fresh reviewers.
- Require reviewers to record full reports on their review beads instead of
  editing the spec directly.
- When a required decision is missing, call `request_user_input` instead of
  asking multiple-choice questions in plain text.
- Ask 1 concise question at a time (max 3 per call), provide mutually
  exclusive options, put the recommended option first with "(Recommended)",
  and wait for the tool response before continuing.

## Step Lifecycle (Molecule Work Loop)

This formula runs as a molecule — each step is a wisp bead. Use the
standard molecule work loop to advance through steps:

```bash
bd mol current <molecule-id>
# execute the step
bd close <step-id>
bd mol current <molecule-id>
# repeat until complete
```

`bd mol current <molecule-id>` is the sole source of truth for what to do next.
Execute exactly that current wisp and nothing beyond it.

After closing a wisp, stop and re-run `bd mol current <molecule-id>` before
starting anything else. Do not begin the next stage from memory, expected
sequence, prior banner text, or "workflow intent" alone.

Re-running `bd mol current <molecule-id>` is a refresh step, not a stop-and-wait
boundary. If it returns another actionable wisp, execute it immediately. Do not
pause for apologies, hand-holding, or workflow-boundary summaries unless the
current wisp explicitly says `STOP` or requires `request_user_input`.

Status updates are not pause points. If a wisp tells you to report findings,
state, or completion, do so and then continue the molecule loop immediately
unless the wisp explicitly requires `request_user_input` or says `STOP`.

Do NOT batch-close steps or work ahead.
"""
formula = "enrich-expansion"
type = "expansion"
pour = true
version = 1

[vars]
[vars.feature]
description = "Feature name (maps to docs/plans/{{feature}}/spec.md)"
required = true

# ============================================================================
# KICKOFF
# ============================================================================

[[template]]
id = "{target}.kickoff"
title = "Enrich Kickoff"
description = """
═══════════════════════════════════════════════════════════════
 ENRICH
 Read a spec, find gaps, fix what's obvious, ask what's not.

 Input:  docs/plans/{{feature}}/spec.md
 Output: Updated docs/plans/{{feature}}/spec.md (enriched)
═══════════════════════════════════════════════════════════════

Output this banner to the user, then close this step to begin.
"""

# ============================================================================
# STEP 1: VALIDATE SPEC
# ============================================================================

[[template]]
id = "{target}.validate-spec"
title = "Validate spec exists"
needs = ["{target}.kickoff"]
description = """
Validate that the spec exists and is substantive enough to analyze.

## Validate

1. Check that `docs/plans/{{feature}}/spec.md` exists.
   If missing: STOP. Report: "No spec found at docs/plans/{{feature}}/spec.md."

2. Read the spec and confirm it has at minimum:
   - Overview
   - Design
   - Scope
   - Non-Negotiables
   - Forbidden Approaches
   - Decision Log
   - Traceability

   If any required sections are missing, STOP and report which ones.

3. Check whether the stronger planning sections are present:
   - Goals
   - Constraints
   - Acceptance Criteria

   If any of these are missing, do NOT stop. Instead, mark them as
   high-priority enrich targets and add them during this run.

4. Validate Decision Log integrity:
   - Each row has Decision ID, topic, chosen option, rejected alternatives,
     rationale, and status.
   - IDs are stable and meaningful (`D-1`, `D-2`, ...).
   - Do not allow blank or placeholder-only decision rows.

5. Assess current depth and note which optional sections exist:
   - Risks table: [present / absent]
   - Testing section: [present / absent]
   - Open Questions: [present / absent]
   - Goals section: [present / absent]
   - Constraints section: [present / absent]
   - Acceptance Criteria: [present / absent]
   - Design sub-sections (Architecture, Components, Data Model, etc.): [which ones]

## Output

```
Spec validated: docs/plans/{{feature}}/spec.md ✓
Depth: [thin / medium / deep]
Required sections verified: [list]
Optional sections present: [list]
Optional sections absent: [list]
Planning sections present: [list]
Planning sections to add or strengthen: [list]

Proceeding to codebase exploration...
```
"""

# ============================================================================
# STEP 2: CODEBASE EXPLORATION
# ============================================================================

[[template]]
id = "{target}.codebase-exploration"
title = "Explore codebase"
needs = ["{target}.validate-spec"]
description = """
Explore the codebase to ground the analysis in reality. This lets the
analysis catch feasibility issues and codebase contradictions that a
text-only review would miss.

## Dispatch Explorer Agent

Subagent task brief:

You are exploring a codebase to support reviewing a design spec for gaps
and issues.

## Read First
- `docs/plans/{{feature}}/spec.md` — the feature spec

## Your Task

Explore the codebase and produce a context summary focused on what's
relevant to verifying the spec's claims and finding gaps.

### What to Discover

1. **Does the spec's Design match reality?**
   - Are referenced files, functions, types, patterns real?
   - Does the proposed architecture fit where the spec says it does?
   - Are there existing implementations the spec should reference but doesn't?

2. **What patterns and conventions exist?**
   - How are similar features built?
   - What error handling, testing, naming conventions are established?
   - What would a PR reviewer expect this feature to follow?

3. **What integration points exist?**
   - What existing code will this feature touch?
   - Are there extension points, registries, config files to update?
   - What data models or schemas are relevant?

4. **What constraints exist?**
   - Build system, CI/CD, deployment considerations
   - Existing tech debt or limitations in relevant areas
   - Performance or compatibility constraints

Be specific — cite file paths, function signatures, actual code.
Focus on what helps verify or challenge the spec, not general exploration.

## OUTPUT
Write to: docs/plans/{{feature}}/codebase-context.tmp


## Wait for Completion

Timeout: 10 minutes. If the agent fails, continue — the analysis will be
less grounded but still useful.
"""

# ============================================================================
# STEP 3: ANALYZE
# ============================================================================

[[template]]
id = "{target}.analyze"
title = "Analyze spec across 6 dimensions"
needs = ["{target}.codebase-exploration"]
description = """
Read the spec and codebase context, then analyze through 6 dimensions.
Use separate reviewer sessions to generate the raw findings, then synthesize
them into one findings list where each item is classified as auto-fix or
decision.

## Inputs

1. `docs/plans/{{feature}}/spec.md` — the spec
2. `docs/plans/{{feature}}/codebase-context.tmp` — codebase context (if available)

## Prepare Shared Review Inputs

```bash
TOP=$(git rev-parse --show-toplevel)
RIG_ROOT=$(printf '%s\n' "$TOP" | sed -E 's#/crew/[^/]+$##; s#/polecats/[^/]+/[^/]+$##')
RIG_NAME=$(basename "$RIG_ROOT")
REVIEW_DIR="$RIG_ROOT/.runtime/reviews/{{feature}}/enrich-$(date +%Y%m%d-%H%M%S)"
mkdir -p "$REVIEW_DIR"
cp docs/plans/{{feature}}/spec.md "$REVIEW_DIR/spec.md"
test -f docs/plans/{{feature}}/codebase-context.tmp && cp docs/plans/{{feature}}/codebase-context.tmp "$REVIEW_DIR/codebase-context.tmp"
```

## Launch 2 Separate Reviewers

Reviewer A: completeness + ambiguity + scope

```bash
ENRICH_A_ID=$(bd create "Enrich review A: {{feature}}" --ephemeral -t task --wisp-type ping --silent \
  --description "$(cat <<EOF
Read:
- $REVIEW_DIR/spec.md
- $REVIEW_DIR/codebase-context.tmp (if present)

Review focus:
- Completeness: what's missing that would block implementation?
- Ambiguity: what could be interpreted two different ways?
- Scope: is the boundary clear, and is anything misplaced?

For each finding:
- Dimension
- Finding title
- Why it matters
- Classification: auto-fix | decision
- Concrete suggested change to the spec

If a reviewed dimension is clean, say so explicitly.

Write your full markdown report onto this review bead's notes.

Rules:
- Do not edit files
- Do not create issues
- After recording the report on the bead, close this bead
EOF
)")

gc sling "$RIG_NAME/reviewer" "$ENRICH_A_ID" --no-formula --nudge
```

Reviewer B: feasibility + risks + consistency

```bash
ENRICH_B_ID=$(bd create "Enrich review B: {{feature}}" --ephemeral -t task --wisp-type ping --silent \
  --description "$(cat <<EOF
Read:
- $REVIEW_DIR/spec.md
- $REVIEW_DIR/codebase-context.tmp (if present)

Review focus:
- Feasibility: what's technically hard or impossible given the codebase?
- Risks: what could go wrong that isn't acknowledged?
- Consistency: does the spec contradict itself or the codebase?

For each finding:
- Dimension
- Finding title
- Why it matters
- Classification: auto-fix | decision
- Concrete suggested change to the spec

If a reviewed dimension is clean, say so explicitly.

Write your full markdown report onto this review bead's notes.

Rules:
- Do not edit files
- Do not create issues
- Quote concrete codebase evidence where applicable
- After recording the report on the bead, close this bead
EOF
)")

gc sling "$RIG_NAME/reviewer-claude" "$ENRICH_B_ID" --no-formula --nudge
```

## Await Both Reports

Wait until both review beads are closed, then inspect their notes directly.

Primary completion signal:
- `Enrich review A: {{feature}}` bead is `closed`
- `Enrich review B: {{feature}}` bead is `closed`

Use:

```bash
bd show "$ENRICH_A_ID"
bd show "$ENRICH_B_ID"
```

If you need live progress, use `gc status --json` to find the running reviewer
session aliases for this rig and `gc session peek <session-alias>` to inspect
them. Use `gc session nudge <session-alias> "..."` only if a reviewer appears
stuck at the initial prompt. Do not move on without both closed review beads
or an explicit failure classification.

### Fidelity Preservation Check (run before classification)

- Preserve all `Non-Negotiables`; they must remain explicit and testable.
- Preserve all `Forbidden Approaches`; do not soften or remove bans silently.
- Preserve `Decision Log` rows with stable IDs and rationale.
- Preserve `Traceability`; each Design subsection should map to at least one
  traceability row.

If a fidelity conflict appears, create a Decision item rather than silently
rewriting or deleting prior intent.

## Synthesis And Classification

Read both review beads and synthesize them into one findings file. For EACH
finding in the synthesis, classify:

**Auto-fix** — apply silently if ALL of these are true:
- There is one clearly correct answer
- It's a best practice, codebase convention, or logical necessity
- No reasonable person would disagree
- Getting it wrong has low impact

Examples: missing error handling pattern that the codebase always uses,
unnamed file path that's obvious from project structure, missing test
expectation that matches existing test patterns.

**Decision** — ask the human if ANY of these are true:
- Multiple valid approaches exist with real tradeoffs
- It depends on business context or user preference
- It changes the scope or architecture significantly
- Getting it wrong would be expensive to fix

Examples: choosing between two valid data models, deciding whether a
feature is in or out of MVP scope, picking an approach where performance
vs simplicity trade off.

## Output

Write to: `docs/plans/{{feature}}/enrichment-findings.tmp`

```markdown
# Enrichment Findings: {{feature}}

**Spec depth:** [thin / medium / deep]
**Models used:** [list]
**Analysis date:** [date]

## Summary

| Dimension | Auto-fix | Decision | Clean |
|-----------|----------|----------|-------|
| Completeness | N | N | [yes/no] |
| Ambiguity | N | N | [yes/no] |
| Feasibility | N | N | [yes/no] |
| Scope | N | N | [yes/no] |
| Risks | N | N | [yes/no] |
| Consistency | N | N | [yes/no] |
| **Total** | **N** | **N** | |

## Auto-Fix Items

### AF-1: [Short title]
- **Dimension:** [which]
- **What:** [the gap]
- **Fix:** [exactly what to add/change in the spec]
- **Spec section:** [which section to modify]

### AF-2: ...

## Decision Items

### D-1: [Decision ID | Short title]
- **Dimension:** [which]
- **What:** [the gap or ambiguity]
- **Why human needed:** [why this can't be auto-resolved]
- **Decision ID:** D-1
- **Options:**
  - [Option A]: [tradeoff]
  - [Option B]: [tradeoff]
- **Recommendation:** [which option and why, if you have one]
- **Spec section:** [which section the answer affects]
- **Current Decision Log row:** [existing row / new row]

### D-2: ...
```

## Quality Gate

Before completing this step, verify:
- [ ] No finding is a "generate 10 questions"-style filler
- [ ] Every auto-fix has a specific, concrete change to make
- [ ] Every decision has genuinely different options with real tradeoffs
- [ ] Findings reference actual codebase evidence where applicable
- [ ] Obvious best practices are NOT listed as findings
"""

# ============================================================================
# STEP 4: AUTO-FIX
# ============================================================================

[[template]]
id = "{target}.auto-fix"
title = "Apply auto-fixes to spec"
needs = ["{target}.analyze"]
description = """
Apply all auto-fix items to the spec silently.

## Process

1. Read `docs/plans/{{feature}}/enrichment-findings.tmp`
2. Read `docs/plans/{{feature}}/spec.md`
3. For each auto-fix item, apply the fix to the relevant spec section
4. Write the updated spec back to `docs/plans/{{feature}}/spec.md`

## Rules

- Preserve the spec's existing structure and voice
- Add content to existing sections rather than creating new sections
  where possible
- If a fix requires a new optional section (e.g., adding a Risks table
  that didn't exist), add it following the template structure
- Do NOT rewrite sections that don't need changes
- Do NOT add commentary like "Added by enrich" — the spec should read
  as a cohesive document

## Output

Report what was changed:

```
## Auto-Fixes Applied

[N] fixes applied to docs/plans/{{feature}}/spec.md:

- [AF-1 title]: [what changed, which section]
- [AF-2 title]: [what changed, which section]
- ...

Proceeding to human decisions...
```

If there are no auto-fix items, report "No auto-fixes needed" and proceed.
"""

# ============================================================================
# STEP 5: HUMAN DECISIONS
# ============================================================================

[[template]]
id = "{target}.human-decisions"
title = "Present decisions to human"
needs = ["{target}.auto-fix"]
description = """
Present each decision item to the human and collect answers.

## If No Decision Items

Report "No decisions needed — spec is clean" and proceed to cleanup.

## If Decision Items Exist

### Present Summary First

```
## Enrichment: {{feature}}

Auto-fixes applied: [N]
Decisions for you: [M]

### Decisions Needed

| # | Topic | Dimension | Why |
|---|-------|-----------|-----|
| D-1 | [title] | [dim] | [one-line why] |
| D-2 | [title] | [dim] | [one-line why] |
```

### Walk Through Each Decision

For each decision item, call `request_user_input`:

- Question: `[What the gap/ambiguity is, concisely]`
- Header: `[Dimension]`
- Options (from the findings):
  - `[Recommended option] (Recommended)`: [tradeoff]
  - `[Alternative]`: [tradeoff]
  - `Defer`: Leave as open question for now

**Rules:**
- One decision at a time
- Lead with recommendation if the analysis had one
- If the human says "defer", add it to Open Questions in the spec
- Do NOT re-ask questions the human already answered
- Do NOT ask follow-up questions that weren't in the findings —
  if the analysis didn't flag it, it's not a gap worth asking about

### After Each Answer

Note the answer. Check if it resolves any other pending decisions
(cascading resolution). If so, skip those and note why.

### After All Decisions

Report:
```
## Decisions Resolved

[M] decisions presented:
- [N] answered
- [K] deferred to Open Questions
- [J] auto-resolved by cascading from other answers

Proceeding to fold answers into spec...
```
"""

# ============================================================================
# STEP 6: FOLD INTO SPEC
# ============================================================================

[[template]]
id = "{target}.fold-answers"
title = "Fold answers into spec"
needs = ["{target}.human-decisions"]
description = """
Incorporate human decision answers into the spec.

## Process

1. Read `docs/plans/{{feature}}/spec.md` (already has auto-fixes from step 4)
2. For each answered decision:
   - Write the answer into the relevant spec section as a design statement
   - Add or update the matching Decision Log row (preserve Decision ID)
   - If it clarifies Design, update the Design section
   - If it refines Scope, update In/Out
3. For each deferred decision:
   - Add to Open Questions section (create section if absent)
4. Write updated spec

## Rules

- Write answers as design statements, not Q&A format
  - YES: "Reviews use a snapshot model — once sent, the review is immutable."
  - NO: "Q: Should reviews be mutable or immutable? A: Immutable."
- Preserve existing content — add to it, don't reorganize
- Keep the spec reading as a cohesive document, not a patchwork

## Output

```
## Spec Updated

docs/plans/{{feature}}/spec.md updated with:
- [N] decisions folded into Design section
- [K] decisions added/updated in Decision Log
- [J] items added to Open Questions

Spec is now enriched. Proceeding to cleanup...
```

If no decisions were made (all auto-fix or no findings), report
"No changes needed" and proceed.
"""

# ============================================================================
# STEP 7: CLEANUP
# ============================================================================

[[template]]
id = "{target}.cleanup"
title = "Cleanup and commit"
needs = ["{target}.fold-answers"]
description = """
Delete transient files and commit the enriched spec.

## Delete Transient Files

```bash
rm -f docs/plans/{{feature}}/codebase-context.tmp
rm -f docs/plans/{{feature}}/enrichment-findings.tmp
```

## Commit

```bash
BRANCH=$(git branch --show-current)
if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
  echo "Refusing to commit on $BRANCH." >&2
  exit 1
fi

git add docs/plans/{{feature}}/spec.md
git diff --cached --quiet docs/plans/{{feature}}/spec.md || \
  git commit -m "feat(plans): enrich {{feature}} spec

  Enrichment pass:
  - Auto-fixes: [N]
  - Decisions resolved: [M]
  - Deferred to open questions: [K]

  Co-Authored-By: Codex <agent>"
```

## Push

```bash
git push -u origin "$(git branch --show-current)" || git push
```

## Report

```
## Enrich Complete: {{feature}}

**Spec:** docs/plans/{{feature}}/spec.md

### Changes
- Auto-fixes applied: [N]
- Decisions resolved: [M]
- Deferred: [K]
- Dimensions clean (no findings): [list]

### Spec Status
- Overview: ✓
- Design: [depth assessment]
- Scope: ✓
- Non-Negotiables: [N entries]
- Forbidden Approaches: [N entries]
- Decision Log: [N entries]
- Traceability: [N mapped elements]
- Risks: [present/absent]
- Testing: [present/absent]
- Open Questions: [N items]

**Transient files cleaned up ✓**

### Next Steps
- Run enrich again for another pass (optional)
- Then continue into the active delivery workflow that fits the feature
```
"""
