# Delivery Workflow Quick
#
# End-to-end delivery in ONE Codex session:
#   bootstrap -> draft-spec -> enrich -> convoy tracking -> implement
#   -> review-implementation -> verify/finalize
#
# No polecat delegation, no handoff checkpoints. Keeps ownership in one session,
# while still recording status in beads.
#
# Usage:
#   gc sling <target> delivery-workflow-quick --formula \
#     --var feature="ipv6-support" \
#     --var brief="Add IPv6 CIDR block and subnet support to VPC components" \
#     [--var epic_id="abc123"]


description = """
Quick Codex-native delivery workflow with convoy-first tracking.

Composes seven stages sequentially:
1. **Bootstrap** - ensure tracking bead + owned convoy + target branch context exist
2. **Draft Spec** - produce the standard `spec.md` design record
3. **Enrich** - tighten spec gaps while preserving serialized intent and traceability
4. **Tracking Setup** - record the locked plan and execution start on the convoy
5. **Implement** - execute all work in THIS session (subagents optional)
6. **Implementation Review** - run the shared multi-agent review skill
7. **Verify + Finalize** - validate, update tracking, land the convoy, and summarize

Use this when you want Codex continuity benefits from a single uninterrupted
thread and only need lightweight convoy visibility instead of a full execution
bead graph.

**Input:** Feature name + brief description
**Output:** Implemented feature + updated convoy/tracking notes + verification summary

## Spec Contract

This workflow relies on the shared `spec.md` contract produced by
`draft-spec-expansion` and strengthened by `enrich-expansion`.

The source of truth for the exact spec shape is:
- `gascity/docs/templates/spec.md`
- `draft-spec-expansion.formula.toml`
- `enrich-expansion.formula.toml`

In practice, the spec now carries richer planning context such as goals,
constraints, and acceptance criteria in addition to design intent, decision
history, and traceability.

## Step Lifecycle (Molecule Work Loop)

This formula runs as a molecule - each step is a wisp bead. Use the
standard molecule work loop to advance through steps:

```bash
bd mol current <molecule-id>
# execute the step
bd close <step-id>
bd mol current <molecule-id>
# repeat until complete
```

`bd mol current <molecule-id>` is the sole source of truth for what to do next.
Execute exactly that current wisp and nothing beyond it.

After closing a wisp, stop and re-run `bd mol current <molecule-id>` before
starting anything else. Do not begin the next stage from memory, expected
sequence, prior banner text, or "workflow intent" alone.

Re-running `bd mol current <molecule-id>` is a refresh step, not a stop-and-wait
boundary. If it returns another actionable wisp, execute it immediately. Do not
pause for apologies, hand-holding, or workflow-boundary summaries unless the
current wisp explicitly says `STOP` or requires `request_user_input`.

Status updates are not pause points. If a wisp tells you to report findings,
state, or completion, do so and then continue the molecule loop immediately
unless the wisp explicitly requires `request_user_input` or says `STOP`.

If a stage expands into more granular wisps, obey those expanded wisps
strictly and individually. Do NOT batch-close steps or work ahead.
"""
formula = "delivery-workflow-quick"
type = "workflow"
pour = true
version = 1

[vars]
[vars.feature]
description = "Feature name (becomes directory name under docs/plans/)"
required = true

[vars.brief]
description = "Feature brief - 1-3 sentences describing what to build"
required = true

[vars.epic_id]
description = "Optional existing tracking bead ID to reuse"
required = false
default = ""

[vars.target_branch]
description = "Optional explicit target branch for downstream work; defaults to the repo default branch when omitted"
required = false
default = ""

[vars.bootstrap_epic_description]
description = "Internal bootstrap epic description"
required = false
default = "Single-session tracked delivery epic for {{feature}}."

[vars.delivery_mode_context]
description = "Internal delivery mode marker"
required = false
default = "single-session"


# ============================================================================
# KICKOFF
# ============================================================================

[[steps]]
id = "kickoff"
title = "Delivery Workflow Quick Kickoff"
description = """
═══════════════════════════════════════════════════════════════
 DELIVERY WORKFLOW QUICK
 Plan and implement end-to-end in one Codex session.

 Feature:  {{feature}}
 Brief:    {{brief}}

 Stages:
   1. Bootstrap (tracking bead + owned convoy + target branch)
   2. Draft Spec (interactive)
   3. Enrich (gap analysis)
   4. Tracking Setup (convoy notes)
   5. Implement (same session, optional subagents)
   6. Implementation Review (shared skill)
   7. Verify + Finalize

 Artifacts:
   - docs/plans/{{feature}}/spec.md
   - docs/plans/{{feature}}/session-context.md
   - docs/plans/{{feature}}/session-ledger.md
═══════════════════════════════════════════════════════════════

Output this banner to the user, then close this step to begin.
"""

# ============================================================================
# STAGE 1: BOOTSTRAP
# ============================================================================

[[steps]]
id = "stage-bootstrap"
title = "Stage 1: Resolve Tracking Bead + Execution Convoy"
needs = ["kickoff"]
description = """
Placeholder expanded by `bootstrap-expansion`.
"""

# ============================================================================
# STAGE 2: DRAFT SPEC (expansion placeholder)
# ============================================================================

[[steps]]
id = "stage-draft-spec"
title = "Stage 2: Draft Spec"
needs = ["stage-bootstrap"]
description = """
Placeholder expanded by `draft-spec-expansion`.

Create `docs/plans/{{feature}}/spec.md` using the shared spec template.
"""

# ============================================================================
# STAGE 3: ENRICH (expansion placeholder)
# ============================================================================

[[steps]]
id = "stage-enrich"
title = "Stage 3: Enrich"
needs = ["stage-draft-spec"]
description = """
Placeholder expanded by `enrich-expansion`.

Strengthen `docs/plans/{{feature}}/spec.md` while preserving:
- Goals
- Constraints
- Acceptance Criteria
- Non-Negotiables
- Forbidden Approaches
- Decision Log
- Traceability
"""

# ============================================================================
# STAGE 4: LIGHTWEIGHT TRACKING SETUP
# ============================================================================

[[steps]]
id = "stage-tracking-setup"
title = "Stage 4: Lightweight Tracking Setup"
needs = ["stage-enrich"]
description = """
Lock the plan into the convoy before implementation starts.

## Inputs

- `docs/plans/{{feature}}/session-context.md`
- `docs/plans/{{feature}}/spec.md`

## Resolve Context

```bash
CONVOY_ID=$(awk -F': ' '/^convoy_id:/{print $2}' docs/plans/{{feature}}/session-context.md)
EPIC_ID=$(awk -F': ' '/^epic_id:/{print $2}' docs/plans/{{feature}}/session-context.md)
```

## Update Tracking Surfaces

Append a planning summary to the convoy:

```bash
bd update "$CONVOY_ID" --append-notes "Single-session start:\n- spec: docs/plans/{{feature}}/spec.md\n- status: plan locked, implementation starting"
bd update "$EPIC_ID" --append-notes "Single-session start:\n- spec: docs/plans/{{feature}}/spec.md\n- status: plan locked, implementation starting"
```

Also record:
- Spec path
- Decision Log count
- Non-Negotiables count
- If the tracking bead exists, mirror only high-signal milestones there
"""

# ============================================================================
# STAGE 5: IMPLEMENT IN THIS SESSION
# ============================================================================

[[steps]]
id = "stage-implement"
title = "Stage 5: Implement in this Session"
needs = ["stage-tracking-setup"]
description = """
Implement the feature end-to-end in THIS session. No polecat delegation.

## Rules

- Stay in one session from start to finish.
- Do not dispatch work to external crews/polecats.
- Subagents are allowed only for bounded subtasks (exploration, focused edits,
  targeted tests), with the parent session owning branch state and final
  integration.
- Preserve `spec.md` intent while implementing; do not silently violate
  Non-Negotiables or Forbidden Approaches.

## Build a Session Ledger

Create/update `docs/plans/{{feature}}/session-ledger.md` with:
- Current status
- Implementation checklist derived from spec Design
- Implementation slice self-check entries
- Commands run + outcomes
- Files changed
- Open risks/blockers

Update this ledger after each major implementation slice.

## Select Domain Profiles

Before implementation gets deep, choose the review/implementation domain lens.

Selection order:
1. explicit choice in spec or session context
2. obvious repo/file heuristics
3. default to `general`

Examples:
- Go-heavy work -> `go-development`
- Neovim plugin work -> `neovim-plugin-development`

Record the selected profiles in `session-context.md` and mirror them in the
session ledger. Keep this conservative - choose specialist profiles only when
the signal is strong.

## Execution Loop

1. Read `docs/plans/{{feature}}/spec.md`
2. Before each implementation slice, declare the proof model in `session-ledger.md`
   - default for behavior changes / bug fixes: red-green evidence
   - otherwise: explicit alternate proof model with rationale
3. Execute one implementation slice
4. Run relevant checks for that slice
5. Write an implementation self-check covering:
   - what changed
   - what spec section or decision it satisfied
   - what proof model was declared
   - what evidence actually exists
- what remains risky or unclear
- whether the next implementation slice still makes sense
6. If the slice feels risky, run one bounded drift-review subagent before continuing
7. Update `session-ledger.md`
8. Append progress notes to the convoy at meaningful checkpoints
9. If a tracking bead exists, mirror only high-signal milestones there

Do not treat an implementation slice as complete if the proof model is missing, vague, or
unsupported by actual evidence.

Prefer small, verified increments over one large final diff.
"""

# ============================================================================
# STAGE 6: IMPLEMENTATION REVIEW
# ============================================================================

[[steps]]
id = "stage-review-implementation"
title = "Stage 6: Run Implementation Review"
needs = ["stage-implement"]
description = """
Run `$review-implementation` before final verification.

This stage owns:
- running the spec-vs-implementation audit with both `gpt` and `claude`
- synthesizing the review result
- returning to fix work if the review finds blocking issues

Do not proceed to final verification until the review result is clean.
"""

# ============================================================================
# STAGE 7: VERIFY + FINALIZE
# ============================================================================

[[steps]]
id = "stage-verify-finalize"
title = "Stage 7: Verify, Finalize, and Report"
needs = ["stage-review-implementation"]
description = """
Placeholder expanded by `verify-finalize-expansion`.
"""

# ============================================================================
# COMPLETE
# ============================================================================

[[steps]]
id = "complete"
title = "Workflow Complete"
needs = ["stage-verify-finalize"]
description = """
Single-session quick workflow complete.

**Artifacts:**
- docs/plans/{{feature}}/spec.md
- docs/plans/{{feature}}/session-context.md
- docs/plans/{{feature}}/session-ledger.md
- <rig-root>/.runtime/reviews/{{feature}}/<run-id>/*.md

**Tracking:**
- Convoy updated with progress and final summary
- Tracking bead updated only for major milestones

**Modeling note:**
This workflow optimizes for single-session continuity while keeping execution
tracking in an owned convoy instead of creating a full execution-bead graph.
"""

# ============================================================================
# COMPOSITION
# ============================================================================

[compose]

[[compose.expand]]
target = "stage-bootstrap"
with = "bootstrap-expansion"
vars = { target_branch = "{target_branch}", bootstrap_epic_description = "{bootstrap_epic_description}", delivery_mode_context = "{delivery_mode_context}" }

[[compose.expand]]
target = "stage-draft-spec"
with = "draft-spec-expansion"

[[compose.expand]]
target = "stage-enrich"
with = "enrich-expansion"

[[compose.expand]]
target = "stage-verify-finalize"
with = "verify-finalize-expansion"
