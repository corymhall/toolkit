# Delivery Workflow Planned
#
# Canonical graph.v2 two-session delivery workflow:
#   session 1 body: bootstrap -> draft-spec -> enrich -> handoff
#   session 2 body: execution-setup -> plan -> execution beads -> finalize convoy
#
# This workflow keeps noisy exploration out of the build session, then hands
# execution to a bead graph plus an owned execution convoy while the current
# coordinator
# remains the owner.
#
# Usage:
#   gc sling delivery-workflow-planned <crew> \
#     --var feature="ipv6-support" \
#     --var brief="Add IPv6 CIDR block and subnet support to VPC components" \
#     [--var epic_id="abc123"] \
#     [--var target_branch="release/1.2"]

description = """
Canonical graph.v2 two-session delivery workflow.

Session 1 is for discovery and convergence inside an explicit graph.v2 scope:
1. **Bootstrap**
2. **Draft Spec**
3. **Enrich**
4. **Handoff Boundary**

Session 2 is for planning and execution setup inside a second explicit scope:
5. **Execution Setup**
6. **Plan**
7. **Create Execution Beads**
8. **Finalize Execution Convoy**
9. **Execution Handoff Complete**

Use this when exploratory design work is noisy and you want the build session
to start from committed artifacts instead of chat history, but still want the
current crew session to own execution through a bead graph rather than through
the formula itself.

**Input:** Feature name + brief description
**Output:** `spec.md` + `plans.md` + execution beads under an owned execution
convoy ready for same-session delivery

## Artifacts

- `docs/plans/{{feature}}/spec.md`
- `docs/plans/{{feature}}/plans.md`
- `docs/plans/{{feature}}/session-context.md`
- execution convoy tracking the execution beads

## Graph.v2 Mechanics

This workflow now uses two explicit phase latches:
- `discovery-body` for session-1 convergence
- `planning-body` for session-2 execution setup

The scoped phases are complemented by graph-native review fanout inside the
retained expansions, so compilation produces real control beads rather than a
purely linear stage list.
"""
formula = "delivery-workflow-planned"
type = "workflow"
pour = true
version = 2

[vars]
[vars.feature]
description = "Feature name (becomes directory name under docs/plans/)"
required = true

[vars.brief]
description = "Feature brief - 1-3 sentences describing what to build"
required = true

[vars.epic_id]
description = "Optional existing root epic ID to reuse"
required = false
default = ""

[vars.target_branch]
description = "Optional explicit target branch for downstream work; defaults to the repo default branch when omitted"
required = false
default = ""

[vars.bootstrap_epic_description]
description = "Internal bootstrap epic description"
required = false
default = "Two-session tracked delivery epic for {{feature}}."

[vars.delivery_mode_context]
description = "Internal delivery mode marker"
required = false
default = "two-session"

# ============================================================================
# KICKOFF
# ============================================================================

[[steps]]
id = "kickoff"
title = "Delivery Workflow Planned Kickoff"
description = """
═══════════════════════════════════════════════════════════════
 DELIVERY WORKFLOW PLANNED
 Two-session delivery:
   session 1 = discovery / convergence
   session 2 = planning / execution setup

 Feature:  {{feature}}
 Brief:    {{brief}}

 Session 1:
   1. Bootstrap
   2. Draft Spec
   3. Enrich
   4. Handoff Boundary

 Session 2:
   5. Execution Setup
   6. Plan (`plans.md`)
   7. Create Execution Beads
   8. Finalize Execution Convoy
   9. Execution Handoff Complete

 Artifacts:
   - docs/plans/{{feature}}/spec.md
   - docs/plans/{{feature}}/plans.md
   - docs/plans/{{feature}}/session-context.md
   - execution convoy metadata in epic notes + session context
═══════════════════════════════════════════════════════════════

Output this banner to the user, then close this step to begin.
"""

# ============================================================================
# SESSION 1 PHASE LATCH
# ============================================================================

[[steps]]
id = "discovery-body"
title = "Session 1 discovery scope"
needs = ["stage-bootstrap", "stage-draft-spec", "stage-enrich", "checkpoint-handoff-ready"]
description = """
Terminal latch for the discovery/convergence phase.

When this scope closes, `spec.md` should be strong enough to act as the
session-boundary contract for the planning/build phase.
"""
metadata = { "gc.kind" = "scope", "gc.scope_name" = "discovery", "gc.scope_role" = "body" }

# ============================================================================
# STAGE 1: BOOTSTRAP
# ============================================================================

[[steps]]
id = "stage-bootstrap"
title = "Stage 1: Resolve Root Epic + Target Branch"
needs = ["kickoff"]
description = """
Placeholder expanded by `bootstrap-expansion`.
"""

# ============================================================================
# STAGE 2: DRAFT SPEC (expansion)
# ============================================================================

[[steps]]
id = "stage-draft-spec"
title = "Stage 2: Draft Spec"
needs = ["stage-bootstrap"]
description = """
Placeholder expanded by `draft-spec-expansion`.

Create `docs/plans/{{feature}}/spec.md` using the shared spec template.
"""

# ============================================================================
# STAGE 3: ENRICH (expansion placeholder)
# ============================================================================

[[steps]]
id = "stage-enrich"
title = "Stage 3: Enrich"
needs = ["stage-draft-spec"]
description = """
Placeholder expanded by `enrich-expansion`.

Strengthen `docs/plans/{{feature}}/spec.md` while preserving:
- Goals
- Constraints
- Acceptance Criteria
- Non-Negotiables
- Forbidden Approaches
- Decision Log
- Traceability
"""

# ============================================================================
# CHECKPOINT: HANDOFF BOUNDARY
# ============================================================================

[[steps]]
id = "checkpoint-handoff-ready"
title = "Checkpoint: Session 1 handoff ready"
needs = ["stage-enrich"]
description = """
This is the intended session boundary.

Session 1 ends only when `spec.md` is clean enough to act as the handoff
contract for the build session.

Before proceeding, verify:
- `spec.md` is committed
- `Goals`, `Constraints`, and `Acceptance Criteria` are explicit
- `Decision Log` captures material trade-offs
- `Non-Negotiables` and `Forbidden Approaches` are explicit
- `Open Questions` contains only real unresolved issues
- any prototype learnings have been distilled into the spec rather than left as
  "see prototype"

Default action:
1. Close this step
2. Handoff / cycle context
3. Resume in a fresh session at the next ready graph bead

Only continue in the same session if you are intentionally bypassing the
recommended boundary for testing or expedience. If you do, state that clearly
in your status update.
"""

# ============================================================================
# SESSION 2 PHASE LATCH
# ============================================================================

[[steps]]
id = "planning-body"
title = "Session 2 planning scope"
needs = ["stage-execution-setup", "stage-plan", "stage-create-execution-beads", "stage-stage-convoy"]
description = """
Terminal latch for the planning/execution-setup phase.

When this scope closes, the convoy-backed execution graph should be ready for
same-session implementation from the tracked beads rather than from the
workflow root.
"""
metadata = { "gc.kind" = "scope", "gc.scope_name" = "planning", "gc.scope_role" = "body" }

# ============================================================================
# STAGE 4: EXECUTION SETUP
# ============================================================================

[[steps]]
id = "stage-execution-setup"
title = "Stage 4: Execution Setup"
needs = ["checkpoint-handoff-ready"]
description = """
Set up the execution handoff for session 2.

## Inputs

- `docs/plans/{{feature}}/session-context.md`
- `docs/plans/{{feature}}/spec.md`

## Resolve Context

```bash
CONVOY_ID=$(awk -F': ' '/^convoy_id:/{print $2}' docs/plans/{{feature}}/session-context.md)
EPIC_ID=$(awk -F': ' '/^epic_id:/{print $2}' docs/plans/{{feature}}/session-context.md)
```

## Always Update Tracking Surfaces

Append a planning/execution-setup note to both the convoy and the tracking bead:

```bash
bd update "$CONVOY_ID" --append-notes "Session 2 start:\n- spec: docs/plans/{{feature}}/spec.md\n- status: planning complete, creating execution beads next"
bd update "$EPIC_ID" --append-notes "Session 2 start:\n- spec: docs/plans/{{feature}}/spec.md\n- status: planning complete, creating execution beads next"
```
"""

# ============================================================================
# STAGE 5: PLAN (expansion)
# ============================================================================

[[steps]]
id = "stage-plan"
title = "Stage 5: Plan"
needs = ["stage-execution-setup"]
description = """
Placeholder expanded by `plan-expansion`.

Generate and finalize `docs/plans/{{feature}}/plans.md`.
"""

# ============================================================================
# STAGE 6: CREATE EXECUTION BEADS
# ============================================================================

[[steps]]
id = "stage-create-execution-beads"
title = "Stage 6: Create Execution Beads"
needs = ["stage-plan"]
description = """
Placeholder expanded by `execution-beads-expansion`.
"""

# ============================================================================
# STAGE 7: CREATE EXECUTION CONVOY
# ============================================================================

[[steps]]
id = "stage-stage-convoy"
title = "Stage 7: Finalize Execution Convoy"
needs = ["stage-create-execution-beads"]
description = """
Confirm the execution convoy is the primary container for the execution graph.

## Inputs

- execution convoy from `session-context.md`
- execution beads created from `plans.md`
- `target_branch` from `session-context.md`

## Resolve Context

Run:

```bash
EPIC_ID=$(awk -F': ' '/^epic_id:/{print $2}' docs/plans/{{feature}}/session-context.md)
TARGET_BRANCH=$(awk -F': ' '/^target_branch:/{print $2}' docs/plans/{{feature}}/session-context.md)
CONVOY_ID=$(awk -F': ' '/^convoy_id:/{print $2}' docs/plans/{{feature}}/session-context.md)
```

## Verify Convoy Ownership

The convoy should already exist from bootstrap. Confirm it is present and that
its target branch still matches the intended execution branch:

```bash
gc convoy target "$CONVOY_ID" "$TARGET_BRANCH"
gc convoy status "$CONVOY_ID"
```

## Verify Tracked Execution Beads

The execution beads should now be direct children of the convoy, not of the
tracking bead:

```bash
bd list --parent "$CONVOY_ID" --all --limit 0 --json
```

If expected execution beads are missing from the convoy, stop and repair the
execution bead graph before continuing.

## Persist

Refresh the convoy metadata recorded in `docs/plans/{{feature}}/session-context.md`.

```bash
TMP_CONTEXT=$(mktemp)
grep -Ev '^convoy_id:|^convoy_status:' docs/plans/{{feature}}/session-context.md > "$TMP_CONTEXT"
{
  cat "$TMP_CONTEXT"
  printf 'convoy_id: %s\n' "$CONVOY_ID"
  printf 'convoy_status: %s\n' "open"
} > docs/plans/{{feature}}/session-context.md
rm -f "$TMP_CONTEXT"
```

Also append notes including:
- `plans.md` path
- execution convoy ID
- execution convoy target branch
- confirmation that the convoy, not the epic, is the execution container
- next command to begin same-session execution with `$epic-delivery`

Do not dispatch from this workflow. The execution convoy is the primary
execution container for the current-session delivery path.
"""

# ============================================================================
# COMPOSITION
# ============================================================================

[compose]

[[compose.expand]]
target = "stage-bootstrap"
with = "bootstrap-expansion"
vars = { target_branch = "{target_branch}", bootstrap_epic_description = "{bootstrap_epic_description}", delivery_mode_context = "{delivery_mode_context}" }

[[compose.expand]]
target = "stage-draft-spec"
with = "draft-spec-expansion"

[[compose.expand]]
target = "stage-enrich"
with = "enrich-expansion"

[[compose.expand]]
target = "stage-plan"
with = "plan-expansion"

[[compose.expand]]
target = "stage-create-execution-beads"
with = "execution-beads-expansion"
