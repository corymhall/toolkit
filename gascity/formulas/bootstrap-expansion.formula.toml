# Bootstrap Expansion
#
# Shared bootstrap stage for delivery workflows.

description = """
Ensure the feature has a tracking bead, an owned execution convoy, a resolved
target branch, and initial session context before later stages write planning
or execution artifacts.
"""
formula = "bootstrap-expansion"
type = "expansion"
pour = true
version = 1

[vars]
[vars.feature]
description = "Feature name"
required = true

[vars.brief]
description = "Feature brief"
required = true

[vars.epic_id]
description = "Optional existing root epic ID to reuse"
required = false
default = ""

[vars.target_branch]
description = "Optional explicit target branch for downstream work; defaults to the repo default branch when omitted"
required = false
default = ""

[vars.bootstrap_epic_description]
description = "Root epic description used when creating a new epic"
required = false
default = "Tracked delivery epic for {{feature}}."

[vars.delivery_mode_context]
description = "Session-context delivery mode value"
required = false
default = "single-session"

[[template]]
id = "{target}.execute"
title = "Resolve Tracking Bead + Execution Convoy + Target Branch"
description = """
Ensure this feature has a tracking bead, an owned execution convoy, and a
resolved target branch before writing artifacts.

## Branch Safety

Starting on `main`/`master` is allowed only for this bootstrap step.
After bootstrap, switch to or create a normal working branch before writing
files.

## Resolve/Create Tracking Bead

If `epic_id` provided:

```bash
bd show {{epic_id}}
EPIC_ID={{epic_id}}
```

Otherwise, try to reuse one:

```bash
bd list --title-contains "{{feature}}" --type epic
```

If none is suitable, create one:

```bash
EPIC_ID=$(bd create "{{feature}}" -t epic -p P1 -d "{{bootstrap_epic_description}}"
  --json | jq -r '.[0].id // .id')
```

## Resolve Target Branch

If `target_branch` was provided, use it:

```bash
TARGET_BRANCH="{{target_branch}}"
TARGET_BRANCH_SOURCE="explicit"
```

Otherwise resolve the repo default branch:

```bash
TARGET_BRANCH=$(git remote show origin | awk '/HEAD branch/ {print $NF; exit}')
if [ -z "$TARGET_BRANCH" ]; then
  TARGET_BRANCH=$(git branch --show-current)
fi
TARGET_BRANCH_SOURCE="repo-default"
```

Record the target branch on the tracking bead so later worker dispatch can
inherit it if needed:

```bash
bd update "$EPIC_ID" --set-metadata target="$TARGET_BRANCH"
```

## Resolve/Create Execution Convoy

If a prior session context already recorded a convoy, reuse it:

```bash
CONVOY_ID=""
if [ -f docs/plans/{{feature}}/session-context.md ]; then
  CANDIDATE_CONVOY_ID=$(awk -F': ' '/^convoy_id:/{print $2}' docs/plans/{{feature}}/session-context.md)
  if [ -n "$CANDIDATE_CONVOY_ID" ] && bd show "$CANDIDATE_CONVOY_ID" >/dev/null 2>&1; then
    CONVOY_ID="$CANDIDATE_CONVOY_ID"
  fi
fi
```

Otherwise create a new owned convoy and make the tracking bead its child:

```bash
if [ -z "$CONVOY_ID" ]; then
  CONVOY_CREATE_OUTPUT=$(gc convoy create "{{feature}}" "$EPIC_ID" --owned --target "$TARGET_BRANCH")
  CONVOY_ID=$(printf '%s\n' "$CONVOY_CREATE_OUTPUT" | awk '/^Created convoy / {print $3; exit}')
fi
if [ -z "$CONVOY_ID" ]; then
  echo "Failed to resolve execution convoy"
  exit 1
fi
gc convoy target "$CONVOY_ID" "$TARGET_BRANCH"
```

## Create/Switch Working Branch

The target branch is where downstream worker branches should be based. The
current planning session should work on a normal branch, not a special
integration primitive.

```bash
CURRENT_BRANCH=$(git branch --show-current)
WORKING_BRANCH="$CURRENT_BRANCH"
if [ "$CURRENT_BRANCH" = "main" ] || [ "$CURRENT_BRANCH" = "master" ] || [ "$CURRENT_BRANCH" = "$TARGET_BRANCH" ]; then
  WORKING_BRANCH="corymhall/{{feature}}"
  git fetch --prune origin "$TARGET_BRANCH"
  git switch -C "$WORKING_BRANCH" "origin/$TARGET_BRANCH"
fi
```

## Persist Session Context

```bash
mkdir -p docs/plans/{{feature}}
cat > docs/plans/{{feature}}/session-context.md <<CTX
feature: {{feature}}
brief: {{brief}}
convoy_id: $CONVOY_ID
convoy_status: open
epic_id: $EPIC_ID
target_branch: $TARGET_BRANCH
target_branch_source: $TARGET_BRANCH_SOURCE
working_branch: $WORKING_BRANCH
review_categories: all
review_profiles_selected: general
delivery_mode: {{delivery_mode_context}}
CTX
```

## Output

Report:
- convoy ID
- epic ID
- target branch
- working branch
"""
