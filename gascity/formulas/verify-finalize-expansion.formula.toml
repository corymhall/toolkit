# Verify + Finalize Expansion
#
# Shared final verification/finalization stage for delivery workflows.

description = """
Run final verification, finalize tracking state, and summarize completion.
"""
formula = "verify-finalize-expansion"
type = "expansion"
pour = true
version = 2

[vars]
[vars.feature]
description = "Feature name"
required = true

[[template]]
id = "{target}.body"
title = "Verify/finalize scope"
needs = ["{target}.verify", "{target}.finalize"]
description = """
Terminal latch for the verification/finalization phase.

This scope succeeds only after verification is complete and the final convoy /
tracking summary has been written and landed successfully.
"""
metadata = { "gc.kind" = "scope", "gc.scope_name" = "verify-finalize", "gc.scope_role" = "body" }

[[template]]
id = "{target}.verify"
title = "Run final verification"
description = """
Run final verification and record the evidence.

## Verification

- Execute relevant test/lint/build commands for changed areas.
- If full suite is too expensive, run targeted commands and state limitations.
- Record all verification commands + outcomes in `session-ledger.md`.
"""
metadata = { "gc.scope_ref" = "{target}.body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.continuation_group" = "main", "gc.session_affinity" = "require" }

[[template]]
id = "{target}.finalize"
title = "Finalize tracking and report"
needs = ["{target}.verify"]
description = """
Finalize tracking state and summary after verification passes.

## Tracking Finalization

```bash
CONVOY_ID=$(awk -F': ' '/^convoy_id:/{print $2}' docs/plans/{{feature}}/session-context.md)
EPIC_ID=$(awk -F': ' '/^epic_id:/{print $2}' docs/plans/{{feature}}/session-context.md)
```

Append the final execution summary to the convoy. If a tracking epic exists,
mirror the same summary there. For single-session quick delivery, land the
owned convoy after confirming the work is complete.

## Final Notes

Append:
- spec path
- if `plans.md` exists, include plans path
- ledger path
- review artifact paths
- verification commands run
- unresolved risks (if any)
- completion status

Then finalize the owned convoy:

```bash
gc convoy status "$CONVOY_ID"
gc convoy land "$CONVOY_ID"
```

## Output

Provide a concise completion report including:
- what was implemented
- what was verified
- convoy land result
- what remains (if anything)
"""
metadata = { "gc.scope_ref" = "{target}.body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.continuation_group" = "main", "gc.session_affinity" = "require" }
