# Plan Expansion
#
# Read a cleaned spec, generate a milestone implementation plan, review it
# twice, and leave behind `plans.md` as the build contract for delivery-workflow-planned.
#
# Steps:
#   1. Validate spec
#   2. Draft milestone plan
#   3. Review pass 1 (completeness + scope/constraints)
#   4. Review pass 2 (sequencing + testability/risk)
#   5. Finalize plan
#
# Usage:
#   gc sling plan-expansion <crew> --var feature="ipv6-support"

description = """
Read a cleaned `spec.md`, generate `plans.md`, run two slung plan review
passes with graph.v2 review fanout lanes writing durable reports, and leave behind a
build-ready milestone plan.

**Input:** `docs/plans/{{feature}}/spec.md`
**Output:** `docs/plans/{{feature}}/plans.md`

This formula is intended for the planning/build handoff in
`delivery-workflow-planned`. It is not a replacement for `beadify` and it does not
implement code.

## Review Model

By default this formula runs two explicit plan review passes. Each pass:

- materializes the current review inputs into a shared `.runtime` directory
- writes lane-specific prompt files plus a compact review manifest
- emits that manifest as `gc.output_json`
- lets graph.v2 fanout materialize 2 review lanes
- waits on the generated fanout control before synthesizing fixes

1. **Completeness + scope/constraints**
2. **Sequencing + testability/risk**

Escalate beyond these two passes only when the work is unusually large,
ambiguous, or expensive to rework late.

## Artifact Contract

`plans.md` is a milestone plan, not a second spec. It should contain:
- 3-7 milestones
- milestone-specific acceptance criteria
- milestone-specific validation commands or proof expectations
- at least one early shape-validation milestone for medium/large work
- stop conditions that trigger plan revision before continuing

Use the standard template at `gascity/docs/templates/plans.md`.

## Graph-First Execution Contract

When this expansion is used inside a graph.v2 workflow, workers execute ready
beads directly. Do not rely on `bd mol current` or other molecule-only
positioning semantics in the canonical Gas City path.
"""
formula = "plan-expansion"
type = "expansion"
pour = true
version = 2

[vars]
[vars.feature]
description = "Feature name (maps to docs/plans/{{feature}}/spec.md)"
required = true

[vars.review_target_a]
description = "Optional explicit reviewer target for lane A"
required = false
default = ""

[vars.review_target_b]
description = "Optional explicit reviewer target for lane B"
required = false
default = ""

# ============================================================================
# KICKOFF
# ============================================================================

[[template]]
id = "{target}.kickoff"
title = "Plan Expansion Kickoff"
description = """
═══════════════════════════════════════════════════════════════
 PLAN EXPANSION
 Clean spec -> milestone plan -> 2 review passes -> finalized `plans.md`

 Input:  docs/plans/{{feature}}/spec.md
 Output: docs/plans/{{feature}}/plans.md
═══════════════════════════════════════════════════════════════

Output this banner to the user, then close this step to begin.
"""

# ============================================================================
# STEP 1: VALIDATE SPEC
# ============================================================================

[[template]]
id = "{target}.validate-spec"
title = "Validate spec for planning"
needs = ["{target}.kickoff"]
description = """
Validate that `spec.md` is clean enough to become a build plan.

## Validate

1. Confirm `docs/plans/{{feature}}/spec.md` exists.
   If missing: STOP and report it.

2. Read the spec and confirm the minimum planning contract is present:
   - Overview
   - Goals
   - Scope
   - Constraints
   - Acceptance Criteria
   - Design
   - Non-Negotiables
   - Forbidden Approaches
   - Decision Log
   - Traceability

3. If `Goals`, `Constraints`, or `Acceptance Criteria` are missing, do not
   start plan generation. Report the missing sections and return to spec work.

4. Check for prototype leakage:
   - If the spec says "see prototype" or otherwise depends on raw prototype
     code as the handoff artifact, stop and distill those learnings into the
     spec first.

5. Check `Open Questions`:
   - If there are still many unresolved issues that materially change
     sequencing or milestones, stop and return to convergence work.

## Output

```
Spec validated for planning: docs/plans/{{feature}}/spec.md
Planning-ready sections: [list]
Open questions acceptable for planning: [yes/no]

Proceeding to milestone plan generation...
```
"""

# ============================================================================
# STEP 2: DRAFT PLAN
# ============================================================================

[[template]]
id = "{target}.draft-plan"
title = "Draft milestone plan"
needs = ["{target}.validate-spec"]
description = """
Generate `docs/plans/{{feature}}/plans.md` from the spec.

## Inputs

- `docs/plans/{{feature}}/spec.md`
- `gascity/docs/templates/plans.md`

## Planning Rules

Generate a milestone plan, not a second spec.

Requirements:
- 3-7 milestones by default
- each milestone must include:
  - goal
  - planned changes
  - acceptance criteria
  - validation commands or proof expectations
  - review stop flag
- milestone 1 must validate the implementation shape for medium/large work
- milestone ordering must reflect true sequencing, not arbitrary phase labels
- stop conditions should capture when the plan must be revised

When deciding milestone boundaries:
- prefer coherent vertical slices over broad technical buckets
- keep milestone 1 small enough to review before the whole feature is built
- fold prototype learnings into milestone design, but do not tell the build
  session to "follow the prototype"

## Write

Write `docs/plans/{{feature}}/plans.md` using the standard template.

## Output

Report:
- milestone count
- whether milestone 1 is a shape-validation milestone
- any areas still likely to cause late rework
"""

# ============================================================================
# STEP 3: REVIEW PASS 1 FANOUT PREP
# ============================================================================

[[template]]
id = "{target}.review-pass-1-survey"
title = "Review pass 1: prepare fanout lanes"
needs = ["{target}.draft-plan"]
description = """
Prepare the two graph.v2 review lanes for pass 1.

## Inputs

- `docs/plans/{{feature}}/spec.md`
- `docs/plans/{{feature}}/plans.md`

## Prepare Shared Review Inputs

Before slinging fresh reviewers, materialize the current artifact state in a
shared directory:

```bash
TOP=$(git rev-parse --show-toplevel)
RIG_ROOT=$(printf '%s\n' "$TOP" | sed -E 's#/crew/[^/]+$##; s#/polecats/[^/]+/[^/]+$##')
RIG_NAME=$(basename "$RIG_ROOT")
REPORT_TO="${BD_ACTOR}"
REVIEW_DIR="$RIG_ROOT/.runtime/reviews/{{feature}}/plan-pass-1-$(date +%Y%m%d-%H%M%S)"
mkdir -p "$REVIEW_DIR"
cp docs/plans/{{feature}}/spec.md "$REVIEW_DIR/spec.md"
cp docs/plans/{{feature}}/plans.md "$REVIEW_DIR/plans.md"
```

## Write Lane Briefs

Create one prompt file per lane. The dynamic fanout step will materialize a
review bead for each file.

Reviewer A: completeness

```bash
cat > "$REVIEW_DIR/review-1a.md" <<'EOF'
Read:
- $REVIEW_DIR/spec.md
- $REVIEW_DIR/plans.md

Review focus:
- Does the plan cover all material goals and acceptance criteria?
- Is any important slice missing entirely?
- Are milestone boundaries complete enough to execute without hidden missing work?

Report format:
- Finding title
- Severity: must-fix | should-fix
- Why it matters
- Suggested plan change

Rules:
- Do not edit files
- Do not create issues
EOF
```

Reviewer B: scope + constraints

```bash
cat > "$REVIEW_DIR/review-1b.md" <<'EOF'
Read:
- $REVIEW_DIR/spec.md
- $REVIEW_DIR/plans.md

Review focus:
- Is any milestone carrying out-of-scope or clearly deferrable work?
- Are non-goals still respected?
- Do milestones respect stated constraints and non-negotiables?
- Did prototype learnings become explicit rules rather than implicit code cargo cult?

Report format:
- Finding title
- Severity: must-fix | should-fix
- Why it matters
- Suggested plan or spec change

Rules:
- Do not edit files
- Do not create issues
EOF
```

## Emit Review Manifest For Fanout

Write the dynamic review manifest and copy it into `gc.output_json` before
closing this step:

```bash
cat > "$REVIEW_DIR/review-pass-1.json" <<EOF
{
  "items": [
    {
      "title": "Plan review 1A: {{feature}} completeness",
      "reviewer_target": "{{review_target_a}}",
      "prompt_path": "$REVIEW_DIR/review-1a.md",
      "report_path": "$REVIEW_DIR/report-1a.md"
    },
    {
      "title": "Plan review 1B: {{feature}} scope and constraints",
      "reviewer_target": "{{review_target_b}}",
      "prompt_path": "$REVIEW_DIR/review-1b.md",
      "report_path": "$REVIEW_DIR/report-1b.md"
    }
  ]
}
EOF
MANIFEST_JSON=$(jq -c . "$REVIEW_DIR/review-pass-1.json")
bd update "$GC_BEAD_ID" --set-metadata gc.output_json="$MANIFEST_JSON"
```

After this step closes, graph.v2 fanout will spawn one review lane per item
using `review-lane-expansion`.
"""

[template.on_complete]
for_each = "output.items"
bond = "review-lane-expansion"
parallel = true

[template.on_complete.vars]
title = "{item.title}"
reviewer_target = "{item.reviewer_target}"
prompt_path = "{item.prompt_path}"
report_path = "{item.report_path}"

# ============================================================================
# STEP 3B: REVIEW PASS 1 SYNTHESIS
# ============================================================================

[[template]]
id = "{target}.review-pass-1-synthesize"
title = "Review pass 1: synthesize lane reports"
needs = ["{target}.review-pass-1-survey"]
description = """
Wait for the fanout control to close, then review the lane reports and apply
fixes to `plans.md`.

## Inputs

- `docs/plans/{{feature}}/spec.md`
- `docs/plans/{{feature}}/plans.md`
- the review directory created in the previous step

## Apply Fixes

Read both report files. Apply all must-fix items and any should-fix items that make
the plan materially better.

- update `docs/plans/{{feature}}/plans.md`
- update `docs/plans/{{feature}}/spec.md` only if the review reveals a real
  spec gap or contradiction

Expected reports:

```bash
find "$RIG_ROOT/.runtime/reviews/{{feature}}" -name 'report-1*.md' -print
```

## Output

Report:
- which lane reports arrived
- issues found
- fixes applied
- whether the spec also needed revision
"""

# ============================================================================
# STEP 4: REVIEW PASS 2 FANOUT PREP
# ============================================================================

[[template]]
id = "{target}.review-pass-2-survey"
title = "Review pass 2: prepare fanout lanes"
needs = ["{target}.review-pass-1-synthesize"]
description = """
Prepare the two graph.v2 review lanes for pass 2.

## Inputs

- `docs/plans/{{feature}}/spec.md`
- `docs/plans/{{feature}}/plans.md`

## Prepare Shared Review Inputs

```bash
TOP=$(git rev-parse --show-toplevel)
RIG_ROOT=$(printf '%s\n' "$TOP" | sed -E 's#/crew/[^/]+$##; s#/polecats/[^/]+/[^/]+$##')
RIG_NAME=$(basename "$RIG_ROOT")
REPORT_TO="${BD_ACTOR}"
REVIEW_DIR="$RIG_ROOT/.runtime/reviews/{{feature}}/plan-pass-2-$(date +%Y%m%d-%H%M%S)"
mkdir -p "$REVIEW_DIR"
cp docs/plans/{{feature}}/spec.md "$REVIEW_DIR/spec.md"
cp docs/plans/{{feature}}/plans.md "$REVIEW_DIR/plans.md"
```

## Write Lane Briefs

Reviewer A: sequencing

```bash
cat > "$REVIEW_DIR/review-2a.md" <<'EOF'
Read:
- $REVIEW_DIR/spec.md
- $REVIEW_DIR/plans.md

Review focus:
- Is the milestone order correct?
- Are there hidden dependencies or unnecessary serialization?
- Is the implementation order likely to create late rework?

Report format:
- Finding title
- Severity: must-fix | should-fix
- Why it matters
- Suggested reorder or dependency change

Rules:
- Do not edit files
- Do not create issues
EOF
```

Reviewer B: testability + risk

```bash
cat > "$REVIEW_DIR/review-2b.md" <<'EOF'
Read:
- $REVIEW_DIR/spec.md
- $REVIEW_DIR/plans.md

Review focus:
- Can each milestone be validated before moving on?
- Are the validation commands or proof expectations concrete enough?
- What could still force major refactoring late?
- Are the stop conditions strong enough to catch drift before the end?

Report format:
- Finding title
- Severity: must-fix | should-fix
- Why it matters
- Suggested validation or risk-mitigation change

Rules:
- Do not edit files
- Do not create issues
EOF
```

## Emit Review Manifest For Fanout

Write the dynamic review manifest and copy it into `gc.output_json` before
closing this step:

```bash
cat > "$REVIEW_DIR/review-pass-2.json" <<EOF
{
  "items": [
    {
      "title": "Plan review 2A: {{feature}} sequencing",
      "reviewer_target": "{{review_target_a}}",
      "prompt_path": "$REVIEW_DIR/review-2a.md",
      "report_path": "$REVIEW_DIR/report-2a.md"
    },
    {
      "title": "Plan review 2B: {{feature}} testability and risk",
      "reviewer_target": "{{review_target_b}}",
      "prompt_path": "$REVIEW_DIR/review-2b.md",
      "report_path": "$REVIEW_DIR/report-2b.md"
    }
  ]
}
EOF
MANIFEST_JSON=$(jq -c . "$REVIEW_DIR/review-pass-2.json")
bd update "$GC_BEAD_ID" --set-metadata gc.output_json="$MANIFEST_JSON"
```

After this step closes, graph.v2 fanout will spawn one review lane per item
using `review-lane-expansion`.
"""

[template.on_complete]
for_each = "output.items"
bond = "review-lane-expansion"
parallel = true

[template.on_complete.vars]
title = "{item.title}"
reviewer_target = "{item.reviewer_target}"
prompt_path = "{item.prompt_path}"
report_path = "{item.report_path}"

# ============================================================================
# STEP 4B: REVIEW PASS 2 SYNTHESIS
# ============================================================================

[[template]]
id = "{target}.review-pass-2-synthesize"
title = "Review pass 2: synthesize lane reports"
needs = ["{target}.review-pass-2-survey"]
description = """
Wait for the fanout control to close, then review the lane reports and apply
the sequencing/testability fixes.

## Apply Fixes

Read both report files. Apply all must-fix items and any should-fix items that make
the plan materially safer to execute.

- update `docs/plans/{{feature}}/plans.md`
- update `docs/plans/{{feature}}/spec.md` only if the review reveals unresolved
  ambiguity that would make the build session unsafe

## Output

Report:
- which lane reports arrived
- sequencing issues fixed
- validation gaps fixed
- late-rework risks that remain, if any
"""

# ============================================================================
# STEP 5: FINALIZE PLAN
# ============================================================================

[[template]]
id = "{target}.finalize-plan"
title = "Finalize `plans.md`"
needs = ["{target}.review-pass-2-synthesize"]
description = """
Finalize the build-ready milestone plan and summarize the handoff.

## Inputs

- `docs/plans/{{feature}}/spec.md`
- `docs/plans/{{feature}}/plans.md`

## Final Checks

- `plans.md` exists and matches the standard template shape
- milestone count is sane
- milestone 1 clearly validates the feature shape
- each milestone has acceptance criteria and validation evidence
- stop conditions exist for material drift

## Output

Report:
- plan path
- milestone count
- whether milestone 1 review stop is required
- remaining open questions, if any

This is the handoff artifact for the build session.
"""
