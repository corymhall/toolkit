description = """
Workflow-native execution item fragment for one derived wave item.

This fragment is instantiated dynamically from `execute-delivery` fanout. It is
the workflow-native replacement for one external execution bead.
"""
formula = "execution-wave-item-expansion"
type = "expansion"
version = 2

[vars.feature]
description = "Feature name"
required = true

[vars.item_id]
description = "Stable execution item identifier"
required = true

[vars.title]
description = "Execution item title"
required = true

[vars.item_kind]
description = "Execution item kind"
required = false
default = "implement"

[vars.objective]
description = "Short objective for this execution item"
required = false
default = ""

[vars.planned_changes]
description = "Planned changes summary"
required = false
default = ""

[vars.acceptance]
description = "Acceptance summary"
required = false
default = ""

[vars.proof]
description = "Verification / proof summary"
required = false
default = ""

[vars.review_stop]
description = "Whether this item is a review stop"
required = false
default = "no"

[vars.base_branch]
description = "Base branch for the execution item"
required = false
default = "main"

[vars.state_path]
description = "Path to the shared execution-state file"
required = true

[[template]]
id = "{target}.prepare-item"
title = "Prepare execution item {{item_id}}"
description = """
Prepare to execute this workflow-native item.

Read:
- `docs/plans/{{feature}}/spec.md`
- `docs/plans/{{feature}}/plans.md`
- `{{state_path}}`

Focus item:
- id: `{{item_id}}`
- title: `{{title}}`
- kind: `{{item_kind}}`
- base branch: `{{base_branch}}`

Before executing, record a short plan in bead notes:
- objective
- planned changes
- acceptance
- proof expectations
"""
metadata = { "gc.scope_role" = "setup", "gc.continuation_group" = "main", "gc.session_affinity" = "require" }

[[template]]
id = "{target}.execute-item"
title = "Execute {{item_id}}: {{title}}"
needs = ["{target}.prepare-item"]
description = """
Execute this workflow-native item.

Item contract:
- objective: {{objective}}
- planned changes: {{planned_changes}}
- acceptance: {{acceptance}}
- proof: {{proof}}
- review stop: {{review_stop}}

Working rules:
- keep the work scoped to this execution item
- preserve the parent workflow's branch intent
- if this item is a review stop, treat it as a hard gate rather than an
  optional suggestion

When implementation or checkpoint work is complete, leave enough evidence for
`record-item-result` to update `{{state_path}}` deterministically.
"""
metadata = { "gc.scope_role" = "member", "gc.continuation_group" = "main", "gc.session_affinity" = "require" }

[[template]]
id = "{target}.record-item-result"
title = "Record result for {{item_id}}"
needs = ["{target}.execute-item"]
description = """
Update `{{state_path}}` with the result of this item and append a concise result
summary to this bead.

At minimum, record:
- item id
- status (`done`, `blocked`, or `failed`)
- files or artifacts touched
- proof collected
- remaining risks

The parent `reconcile-wave` step will read this bead plus `{{state_path}}` to
decide whether to continue, block, or finish execution.
"""
metadata = { "gc.scope_role" = "member", "gc.continuation_group" = "main", "gc.session_affinity" = "require" }
