# Project-level Worktrunk starter for a tmux + Codex workflow.
#
# Usage:
#   wt switch --create feature-name -x 'tmux attach -t {{ branch | sanitize }}'
#
# Result:
# - creates a worktree
# - creates a tmux session named after the branch
# - starts Codex in the left pane
# - leaves a shell open in the right pane

[pre-start]
tmux = """
command -v tmux >/dev/null 2>&1 || exit 0

S={{ branch | sanitize }}
W={{ worktree_path }}

if tmux has-session -t "$S" 2>/dev/null; then
  exit 0
fi

tmux new-session -d -s "$S" -c "$W" -n code
tmux split-window -h -t "$S:code" -c "$W"

if command -v codex >/dev/null 2>&1; then
  tmux send-keys -t "$S:code.0" 'codex' Enter
fi

tmux select-pane -t "$S:code.1"
echo "Created tmux session $S"
"""

[pre-remove]
tmux = """
command -v tmux >/dev/null 2>&1 || exit 0
tmux kill-session -t {{ branch | sanitize }} 2>/dev/null || true
"""

[aliases]
attach = "tmux attach -t {{ branch | sanitize }}"
